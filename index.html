const REP_RANGES = {
  compound_heavy:     {min:5,max:8, label:"5-8 reps"},
  compound_secondary: {min:8,max:12,label:"8-12 reps"},
  isolation:          {min:10,max:15,label:"10-15 reps"},
  accessory:          {min:12,max:20,label:"12-20 reps"},
};

function analysePerformance(logs, ex) {
  if(!logs||logs.length===0) return null;
  const range = REP_RANGES[ex.category||"compound_secondary"];
  const reps = logs.map(l=>l.reps);
  const weight = logs[0].weight;
  const allAtMax = reps.every(r=>r>=range.max);
  const anyBelow = reps.some(r=>r<range.min);
  const completedAllSets = logs.length >= ex.sets;
  let status, decision, message, nextWeight, nextReps;
  if(anyBelow) {
    status="below"; decision="BAJAR PESO";
    const nW = ex.isMancuerna
      ? (MANCUERNAS[Math.max(0,MANCUERNAS.indexOf(weight)-1)]||weight)
      : Math.max(0,Math.round((weight-2.5)*10)/10);
    nextWeight=nW; nextReps=range.min;
    message = "Algunas series por debajo del mínimo ("+range.min+" reps). Próxima sesión baja a "+(nW>0?nW+"kg":"menos carga")+" y empieza desde "+range.min+" reps.";
  } else if(allAtMax && completedAllSets) {
    status="max"; decision="SUBIR PESO";
    let nW=weight;
    if(ex.isMancuerna){const i=MANCUERNAS.indexOf(weight);nW=i!==-1&&i<MANCUERNAS.length-1?MANCUERNAS[i+1]:weight;}
    else if(!ex.isCuerpo&&!ex.isGoma){nW=Math.round((weight+2.5)*10)/10;}
    nextWeight=nW; nextReps=range.min;
    message = ex.isCuerpo||ex.isGoma
      ? "Conseguiste "+range.max+" reps en todas las series. Intenta superarlo la próxima vez."
      : "Completaste todas las series en "+range.max+" reps. Próxima sesión sube a "+nW+"kg desde "+range.min+" reps.";
  } else {
    status="progress"; decision="MANTENER PESO";
    const minReps=Math.min(...reps);
    nextWeight=weight; nextReps=Math.min(minReps+1,range.max);
    message = "Buen trabajo. Mantén "+(weight>0?weight+"kg":"el mismo peso")+" e intenta llegar a "+nextReps+" reps en todas las series. Rango: "+range.label+".";
  }
  return {status,decision,message,nextWeight,nextReps,repsLog:reps,
    emoji:status==="max"?"🟢":status==="below"?"🔴":"🟡"};
}

function MiniChart(props){
  const history=props.history, unit=props.unit, color=props.color||C.accent;
  if(!history||history.length<2) return React.createElement("p",{style:{textAlign:"center",padding:"24px",color:C.textMut,fontSize:13}},"Completa 2+ registros para ver la grafica");
  const vals=history.map(function(h){return h.value!==undefined?h.value:(h.weight>0?h.weight:h.reps);});
  const mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),rng=mx-mn||1;
  const W=300,H=100,P=22;
  const pts=vals.map(function(v,i){return [P+(i/(vals.length-1))*(W-P*2),H-P-((v-mn)/rng)*(H-P*2)];});
  const ln=pts.map(function(p,i){return (i===0?"M":"L")+p[0]+","+p[1];}).join(" ");
  const ar=ln+" L"+pts[pts.length-1][0]+","+(H-P)+" L"+pts[0][0]+","+(H-P)+" Z";
  const trend=vals.length>=2?vals[vals.length-1]-vals[0]:0;
  return React.createElement("div",null,
    React.createElement("svg",{width:"100%",viewBox:"0 0 "+W+" "+H},
      React.createElement("defs",null,
        React.createElement("linearGradient",{id:"cht",x1:"0",y1:"0",x2:"0",y2:"1"},
          React.createElement("stop",{offset:"0%",stopColor:color,stopOpacity:"0.3"}),
          React.createElement("stop",{offset:"100%",stopColor:color,stopOpacity:"0"}))),
      React.createElement("path",{d:ar,fill:"url(#cht)"}),
      React.createElement("path",{d:ln,fill:"none",stroke:color,strokeWidth:"2.5",strokeLinecap:"round",strokeLinejoin:"round"}),
      pts.map(function(p,i){return React.createElement("g",{key:i},
        React.createElement("circle",{cx:p[0],cy:p[1],r:"4",fill:color,stroke:C.bg,strokeWidth:"2"}),
        React.createElement("text",{x:p[0],y:p[1]-9,textAnchor:"middle",fill:color,fontSize:"9",fontFamily:"Inter",fontWeight:"700"},vals[i]+(unit||"")),
        React.createElement("text",{x:p[0],y:H-3,textAnchor:"middle",fill:C.textMut,fontSize:"8",fontFamily:"Inter"},history[i].date));})
    ),
    vals.length>=2&&React.createElement("p",{style:{textAlign:"center",fontSize:11,marginTop:4,color:trend===0?C.textMut:trend>0?C.red:C.green,fontWeight:600}},
      trend===0?"Sin cambio":((trend>0?"+":"")+trend.toFixed(1)+(unit||"")+" desde el inicio"))
