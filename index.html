function loadStore(){try{return JSON.parse(localStorage.getItem(SK)||"{}");}catch{return{};}}
function useStore(){
  const [d,setD]=useState(loadStore);
  const save=useCallback(fn=>{
    setD(prev=>{const n=typeof fn==="function"?fn(prev):fn;try{localStorage.setItem(SK,JSON.stringify(n));}catch{}return n;});
  },[]);
  return [d,save];
}

function getTag(ex){
  if(ex.isCuerpo) return {label:"Peso corporal",color:"#888"};
  if(ex.isGoma)   return {label:"Goma elástica",color:AD};
  if(ex.isMancuerna) return {label:"Mancuerna",color:"#4db8ff"};
  return {label:"Barra",color:"#ff8c4d"};
}

// ─────────────────────────────────────────────
// MINI CHART
// ─────────────────────────────────────────────
function MiniChart({history,unit}){
  if(!history||history.length<2) return(
    <p style={{textAlign:"center",padding:"24px 0",color:"var(--tx3)",fontFamily:"Barlow",fontSize:13}}>Completa 2+ sesiones para ver la gráfica</p>
  );
  const vals=history.map(h=>h.weight>0?h.weight:h.reps);
  const min=Math.min(...vals),max=Math.max(...vals),range=max-min||1;
  const W=300,H=100,P=18;
  const pts=vals.map((v,i)=>[P+(i/(vals.length-1))*(W-P*2), H-P-((v-min)/range)*(H-P*2)]);
  const line=pts.map((p,i)=>`${i===0?"M":"L"}${p[0]},${p[1]}`).join(" ");
  const area=line+` L${pts[pts.length-1][0]},${H-P} L${pts[0][0]},${H-P} Z`;
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
      <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={A} stopOpacity="0.4"/><stop offset="100%" stopColor={A} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill="url(#cg)"/>
      <path d={line} fill="none" stroke={A} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i)=>(
        <g key={i}>
          <circle cx={p[0]} cy={p[1]} r="3.5" fill={A}/>
          <text x={p[0]} y={p[1]-8} textAnchor="middle" fill={A} fontSize="9" fontFamily="Barlow Condensed" fontWeight="700">{vals[i]}{unit}</text>
          <text x={p[0]} y={H-3} textAnchor="middle" fill="var(--tx3)" fontSize="8" fontFamily="Barlow">{history[i].date}</text>
        </g>
      ))}
    </svg>
  );
}

function ExCard({ex,onSelect,selected,T}){
  const gc=GROUP_COLORS[ex.group]||A;
  const tag=getTag(ex);
  return(
    <div onClick={()=>onSelect(ex)} style={{background:selected?A+"18":T.card,border:`1px solid ${selected?A+"88":T.bd}`,borderRadius:16,marginBottom:10,overflow:"hidden",cursor:"pointer",transition:"all 0.2s"}}>
      <div style={{display:"flex",gap:0}}>
        <div style={{width:90,height:80,flexShrink:0,overflow:"hidden"}}>
          <img src={ex.image} alt={ex.name} style={{width:"100%",height:"100%",objectFit:"cover",filter:"brightness(0.7)"}} onError={e=>e.target.style.display="none"}/>
        </div>
        <div style={{padding:"10px 12px",flex:1,minWidth:0}}>
          <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>
            <span style={{fontSize:10,color:gc,background:gc+"20",borderRadius:6,padding:"2px 7px",fontFamily:"Barlow",fontWeight:600}}>{ex.group}</span>
            <span style={{fontSize:10,color:tag.color,background:tag.color+"18",borderRadius:6,padding:"2px 7px",fontFamily:"Barlow",fontWeight:600}}>{tag.label}</span>
          </div>
          <p style={{margin:0,fontFamily:"Barlow Condensed",fontSize:16,fontWeight:800,color:selected?A:T.tx,lineHeight:1.1}}>{ex.name}</p>
          <p style={{margin:"3px 0 0",fontSize:11,color:T.tx3,fontFamily:"Barlow",lineHeight:1.3}}>{ex.muscle}</p>
        </div>
        {selected&&<div style={{width:32,display:"flex",alignItems:"center",justifyContent:"center",background:A,color:"#000",fontWeight:900,fontSize:16}}>✓</div>}
      </div>
    </div>
  );
}

  // theme

  // persist
  useEffect(()=>{saveStore(p=>({...p,dark,unit,sessions,logData,streak}));},[dark,unit,sessions,logData,streak]);
  // timers
  useEffect(()=>{
    if(timerOn) mainRef.current=setInterval(()=>setTotalSecs(s=>s+1),1000);

  },[timerOn]);

  function startSession(s){
    setActiveSession(s);setExIdx(0);setSetIdx(0);
    setTotalSecs(0);setTimerOn(true);
    setSetLogs([]);setShowCues(false);setRestOn(false);setNoteI("");
    const ex=s.exercises[0];
    const plan=getPlan(s.id,ex);
    setWeightI(String(plan.weight));setRepsI(String(plan.reps));
    setScreen("exercise");
  }

  function logSet(){
    const w=parseFloat(weightI)||0;
    const r=parseInt(repsI)||0;
    const ex=activeSession.exercises[exIdx];
    const updated=[...setLogs,{weight:w,reps:r,note:noteI.trim()}];
    setSetLogs(updated);setNoteI("");
    setRestSecs(ex.rest||90);setRestOn(true);
    if(setIdx+1<ex.sets) setSetIdx(s=>s+1);
    else setProgModal({ex,sessionId:activeSession.id,logs:updated});
  }

  function handleProg(choice){
    const{ex,sessionId,logs}=progModal;
    const lastW=logs[logs.length-1].weight;
    const lastR=logs[logs.length-1].reps;
    let nW=lastW,nR=lastR;
    if(choice==="weight"){
      if(ex.isMancuerna){const i=MANCUERNAS.indexOf(lastW);nW=i!==-1&&i<MANCUERNAS.length-1?MANCUERNAS[i+1]:lastW;}
      else nW=Math.round((lastW+2.5)*10)/10;
    } else if(choice==="reps") nR=lastR+1;
    const key=`${sessionId}__${ex.name}`;
    const prev=logData[key]||{};
    const newLD={...logData,[key]:{
      lastWeight:lastW,lastReps:lastR,nextWeight:nW,nextReps:nR,
      history:[...(prev.history||[]),{weight:lastW,reps:lastR,date:new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit"}),note:logs[logs.length-1].note||""}]
    }};
    setLogData(newLD);setProgModal(null);setRestOn(false);
    const next=exIdx+1;
    if(next<activeSession.exercises.length){
      const nEx=activeSession.exercises[next];
      const plan=getPlan(activeSession.id,nEx);
      setWeightI(String(plan.weight));setRepsI(String(plan.reps));
      setExIdx(next);setSetIdx(0);setSetLogs([]);setShowCues(false);setNoteI("");
    } else {
      setTimerOn(false);
      const today=new Date().toDateString();
      setStreak(p=>{
        const yest=new Date(Date.now()-86400000).toDateString();
        if(p.lastDate===today) return p;
        return{count:p.lastDate===yest?p.count+1:1,lastDate:today};
      });
      setScreen("done");
    }
  }

  function swapExercise(sessionIdx,exIdx,newEx){
    setSessions(prev=>prev.map((s,si)=>si!==sessionIdx?s:{
      ...s,exercises:s.exercises.map((e,ei)=>ei!==exIdx?e:{...newEx,libId:newEx.id,sets:e.sets,id:e.id||uid()})
    }));
    setSwapModal(null);
  }

  // ── LIBRARY MODAL ──────────────────────────────────────────────
  if(swapModal){
    const group=swapModal.group;
    const q=libFilter.toLowerCase();
    const filtered=LIBRARY.filter(e=>e.group===group&&(!q||e.name.toLowerCase().includes(q)));
    return(
      <div style={{minHeight:"100vh",background:T.bg,color:T.tx}}>
        <div style={{padding:"52px 20px 0",position:"sticky",top:0,background:T.bg,zIndex:10,paddingBottom:12,borderBottom:`1px solid ${T.bd}`}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
            <button onClick={()=>setSwapModal(null)} style={bBtn(T)}>←</button>
            <div>
              <p style={{fontFamily:"Barlow Condensed",fontSize:22,fontWeight:900,color:T.tx}}>CAMBIAR EJERCICIO</p>
              <p style={{fontSize:12,color:GROUP_COLORS[group]||A,fontFamily:"Barlow",fontWeight:600}}>Grupo: {group}</p>
            </div>
          </div>
          <input value={libFilter} onChange={e=>setLibFilter(e.target.value)} placeholder={`Buscar ejercicio de ${group}...`}
            style={{width:"100%",background:T.card,border:`1px solid ${T.bd}`,borderRadius:10,padding:"10px 14px",color:T.tx,fontSize:14,fontFamily:"Barlow",outline:"none"}}/>
        </div>
        <div style={{padding:"14px 20px 60px"}}>
          {filtered.length===0&&<p style={{color:T.tx3,fontFamily:"Barlow",textAlign:"center",padding:"30px 0",fontSize:13}}>No hay ejercicios con ese nombre</p>}
          {filtered.map(ex=>(
            <ExCard key={ex.id} ex={ex} T={T} onSelect={e=>{swapExercise(swapModal.sessionIdx,swapModal.exIdx,e);setLibFilter("");}}/>
          ))}
        </div>
      </div>
    );
  }

  // ── SETTINGS ───────────────────────────────────────────────────
  if(settingsOpen) return(
    <div style={{minHeight:"100vh",background:T.bg,color:T.tx}}>
      <div style={{padding:"52px 22px 0",display:"flex",alignItems:"center",gap:14,marginBottom:24}}>
        <button onClick={()=>setSettingsOpen(false)} style={bBtn(T)}>←</button>
        <p style={{fontFamily:"Barlow Condensed",fontSize:28,fontWeight:900}}>AJUSTES</p>
      </div>
      <div style={{padding:"0 22px"}}>
        <SLabel t="APARIENCIA"/>
        <SRow label="Tema oscuro" T={T}><Toggle v={dark} on={v=>setDark(v)}/></SRow>
        <SLabel t="UNIDADES" style={{marginTop:20}}/>
        <SRow label="Peso" T={T}>
          <div style={{display:"flex",gap:8}}>
            {["kg","lb"].map(u=>(
              <button key={u} onClick={()=>setUnit(u)} style={{padding:"6px 18px",background:unit===u?A:T.card2,border:`1px solid ${unit===u?A:T.bd}`,borderRadius:8,color:unit===u?"#000":T.tx2,fontFamily:"Barlow Condensed",fontWeight:700,cursor:"pointer"}}>{u}</button>
            ))}
          </div>
        </SRow>
        <SLabel t="DATOS" style={{marginTop:20}}/>
        <button onClick={()=>{
          const rows=[["Ejercicio","Fecha","Peso","Reps","Nota"]];
          Object.entries(logData).forEach(([k,v])=>{const n=k.split("__")[1];(v.history||[]).forEach(h=>rows.push([n,h.date,h.weight,h.reps,h.note||""]));});
          const csv=rows.map(r=>r.join(",")).join("\n");
          const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="historial.csv";a.click();
        }} style={{...fBtn(A),marginBottom:10}}>📊 Exportar historial CSV</button>
        <button onClick={()=>{if(confirm("¿Borrar todos los datos?")){setLogData({});setSessions(DEFAULT_SESSIONS);setStreak({count:0,lastDate:null});}}} style={{...fBtn(T.card2),color:"#ff4d4d",border:"1px solid #ff4d4d33"}}>🗑 Borrar datos</button>
      </div>
    </div>
  );

  // ── HISTORY MODAL ──────────────────────────────────────────────
  if(histModal){
    const key=`${histModal.sessionId}__${histModal.exName}`;
    const d=logData[key];
    const hist=d?.history||[];
    return(
      <div style={{minHeight:"100vh",background:T.bg,color:T.tx,paddingBottom:40}}>
        <div style={{padding:"52px 20px 0",display:"flex",alignItems:"center",gap:14,marginBottom:20}}>
          <button onClick={()=>setHistModal(null)} style={bBtn(T)}>←</button>
          <div>
            <p style={{fontFamily:"Barlow Condensed",fontSize:22,fontWeight:900}}>{histModal.exName.toUpperCase()}</p>
            <p style={{fontSize:12,color:T.tx3,fontFamily:"Barlow"}}>{histModal.muscle}</p>
          </div>
        </div>
        <div style={{padding:"0 20px"}}>
          {d&&(
            <div style={{display:"flex",gap:8,marginBottom:20}}>
              <SCrd label="ÚLTIMO" value={d.lastWeight>0?`${d.lastWeight}${unit}×${d.lastReps}`:`${d.lastReps}r`} T={T}/>
              <SCrd label="PRÓXIMO" value={d.nextWeight>0?`${d.nextWeight}${unit}×${d.nextReps}`:`${d.nextReps}r`} T={T} hl/>
              <SCrd label="VECES" value={hist.length} T={T}/>
            </div>
          )}
          <SLabel t="PROGRESIÓN"/>
          <div style={{background:T.card,border:`1px solid ${T.bd}`,borderRadius:16,padding:14,marginBottom:20,overflowX:"auto"}}>
            <MiniChart history={hist} unit={d?.lastWeight>0?unit:"r"}/>
          </div>
          <SLabel t="HISTORIAL"/>
          {hist.length===0&&<p style={{color:T.tx3,fontFamily:"Barlow",fontSize:13,textAlign:"center",padding:"20px 0"}}>Sin datos todavía</p>}
          {[...hist].reverse().map((h,i)=>(
            <div key={i} style={{background:T.card,border:`1px solid ${T.bd}`,borderRadius:12,padding:"12px 14px",marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <p style={{fontFamily:"Barlow Condensed",fontSize:19,fontWeight:700,color:A}}>{h.weight>0?`${h.weight}${unit} × ${h.reps} reps`:`${h.reps} reps`}</p>
                <p style={{fontSize:12,color:T.tx3,fontFamily:"Barlow"}}>{h.date}</p>
              </div>
              {h.note&&<p style={{margin:"4px 0 0",fontSize:12,color:T.tx2,fontFamily:"Barlow"}}>💬 {h.note}</p>}
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ── HOME ───────────────────────────────────────────────────────
  if(screen==="home"){
    const allRec=sessions.flatMap(s=>s.exercises.map(ex=>({ex,s,d:getLog(s.id,ex.name)})).filter(x=>x.d));
    return(
      <div style={{minHeight:"100vh",background:T.bg,paddingBottom:50}}>
        <div style={{position:"fixed",top:-80,right:-80,width:280,height:280,background:`radial-gradient(circle,${A}12 0%,transparent 70%)`,pointerEvents:"none",zIndex:0}}/>
        <div style={{padding:"52px 22px 0",position:"relative",zIndex:1,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <p style={{fontSize:11,color:T.tx3,letterSpacing:2,fontFamily:"Barlow Condensed",fontWeight:700}}>FULL BODY · HIPERTROFIA</p>
            <h1 style={{fontFamily:"Barlow Condensed",fontSize:70,fontWeight:900,letterSpacing:2,lineHeight:0.88,marginTop:6,color:T.tx}}>
              STRONG<br/><span style={{WebkitTextStroke:`2px ${A}`,WebkitTextFillColor:"transparent"}}> BASE</span>
            </h1>
          </div>
          <button onClick={()=>setSettingsOpen(true)} style={{...bBtn(T),width:40,height:40,marginTop:8,fontSize:18}}>⚙️</button>
        </div>
        {/* Stats */}
        <div style={{display:"flex",gap:8,padding:"18px 22px 0",position:"relative",zIndex:1}}>
          <SCrd label="RACHA" value={`${streak.count}🔥`} T={T}/>
          <SCrd label="RÉCORDS" value={allRec.length} T={T}/>
          <SCrd label={unit.toUpperCase()} value="✓" T={T}/>
        </div>
        {/* Sessions */}
        <div style={{padding:"20px 22px 0",position:"relative",zIndex:1}}>
          <SLabel t="SESIONES"/>
          {sessions.map((s,si)=>{
            const done=s.exercises.filter(e=>getLog(s.id,e.name)).length;
            const total=s.exercises.length;
            const pct=total>0?done/total:0;
            return(
              <div key={s.id} style={{background:T.card,border:`1px solid ${T.bd}`,borderRadius:18,padding:18,marginBottom:14}}>
                {/* header */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={()=>startSession(s)}>
                    <div style={{width:50,height:50,borderRadius:13,display:"flex",alignItems:"center",justifyContent:"center",background:pct===1?A:T.card2,border:`2px solid ${pct>0&&pct<1?A+"55":T.bd}`,fontSize:22}}>{s.icon}</div>
                    <div>
                      <p style={{margin:0,fontFamily:"Barlow Condensed",fontSize:21,fontWeight:800,color:T.tx}}>{s.name}</p>
                      <p style={{margin:"1px 0 0",fontSize:12,color:T.tx3,fontFamily:"Barlow"}}>{s.subtitle} · {total} ejercicios</p>
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <p style={{fontFamily:"Barlow Condensed",fontSize:20,fontWeight:700,color:done>0?A:T.tx3,cursor:"pointer"}} onClick={()=>startSession(s)}>{done}/{total}</p>
                  </div>
                </div>
                {/* progress */}
                <div style={{background:T.card2,borderRadius:99,height:3,marginBottom:12,cursor:"pointer"}} onClick={()=>startSession(s)}>
                  <div style={{height:"100%",borderRadius:99,background:A,width:`${pct*100}%`,transition:"width 0.5s"}}/>
                </div>
                {/* exercise list with swap */}
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {s.exercises.map((ex,ei)=>{
                    const gc=GROUP_COLORS[ex.group]||A;
                    const d=getLog(s.id,ex.name);
                    const tag=getTag(ex);
                    return(
                      <div key={ex.id||ei} style={{display:"flex",alignItems:"center",gap:8,background:T.card2,borderRadius:12,overflow:"hidden"}}>
                        <div style={{width:52,height:44,flexShrink:0,overflow:"hidden"}}>
                          <img src={ex.image} alt={ex.name} style={{width:"100%",height:"100%",objectFit:"cover",filter:"brightness(0.65)"}} onError={e=>e.target.style.display="none"}/>
                        </div>
                        <div style={{flex:1,minWidth:0,padding:"6px 0"}}>
                          <p style={{margin:0,fontFamily:"Barlow Condensed",fontSize:14,fontWeight:800,color:T.tx,lineHeight:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ex.name}</p>
                          <div style={{display:"flex",gap:5,marginTop:2,alignItems:"center"}}>
                            <span style={{fontSize:9,color:gc,background:gc+"20",borderRadius:4,padding:"1px 5px",fontFamily:"Barlow",fontWeight:600}}>{ex.group}</span>
                            {d&&<span style={{fontSize:9,color:A,fontFamily:"Barlow Condensed",fontWeight:700}}>{d.lastWeight>0?`${d.lastWeight}${unit}×${d.lastReps}`:`${d.lastReps}r`}</span>}
                          </div>
                        </div>
                        <div style={{display:"flex",gap:4,padding:"0 8px",flexShrink:0}}>
                          {d&&<button onClick={()=>setHistModal({exName:ex.name,sessionId:s.id,muscle:ex.muscle})} style={{...bBtn(T),width:30,height:30,fontSize:13}}>📈</button>}
                          <button onClick={()=>{setSwapModal({sessionIdx:si,exIdx:ei,group:ex.group});setLibFilter("");}} style={{...bBtn(T),width:30,height:30,fontSize:13,color:A}}>⇄</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
                {/* start button */}
                <button onClick={()=>startSession(s)} style={{...fBtn(A),marginTop:14}}>▶ EMPEZAR SESIÓN</button>
              </div>
            );
          })}
        </div>
        {/* Records */}
        {allRec.length>0&&(
          <div style={{padding:"4px 22px",position:"relative",zIndex:1}}>
            <SLabel t="MIS RÉCORDS"/>
            {allRec.map(({ex,s,d})=>(
              <div key={ex.name+s.id} onClick={()=>setHistModal({exName:ex.name,sessionId:s.id,muscle:ex.muscle})}
                style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 0",borderBottom:`1px solid ${T.bd}`,cursor:"pointer"}}>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{margin:0,fontSize:14,fontFamily:"Barlow",color:T.tx,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ex.name}</p>
                  <p style={{margin:0,fontSize:11,color:GROUP_COLORS[ex.group]||T.tx3,fontFamily:"Barlow"}}>{ex.group} · {s.name}</p>
                </div>
                <div style={{textAlign:"right",flexShrink:0,display:"flex",alignItems:"center",gap:8}}>
                  <div>
                    <p style={{margin:0,fontFamily:"Barlow Condensed",fontSize:18,fontWeight:700,color:A}}>{d.lastWeight>0?`${d.lastWeight}${unit}×${d.lastReps}`:`${d.lastReps} reps`}</p>
                    {(d.nextWeight!==d.lastWeight||d.nextReps!==d.lastReps)&&<p style={{margin:0,fontSize:10,color:T.tx3,fontFamily:"Barlow"}}>→{d.nextWeight>0?`${d.nextWeight}${unit}×`:""}{d.nextReps}</p>}
                  </div>
                  <span style={{color:T.tx3}}>›</span>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

  // ── EXERCISE SCREEN ────────────────────────────────────────────
  if(screen==="exercise"&&activeSession){
    const ex=activeSession.exercises[exIdx];
    const plan=getPlan(activeSession.id,ex);
    const tag=getTag(ex);
    const gc=GROUP_COLORS[ex.group]||A;
    const imgSrc=imgErr[ex.id]?`https://picsum.photos/seed/${ex.id}/600/300`:ex.image;
    const restTotal=ex.rest||90;
    return(
      <div style={{minHeight:"100vh",background:T.bg,color:T.tx,paddingBottom:40}}>
        {/* topbar */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"50px 18px 10px",background:T.bg,position:"sticky",top:0,zIndex:5}}>
          <button onClick={()=>{setTimerOn(false);setScreen("home");}} style={bBtn(T)}>✕</button>
          <div style={{textAlign:"center"}}>
            <p style={{margin:0,fontFamily:"Barlow Condensed",fontSize:14,fontWeight:700,letterSpacing:1,color:T.tx}}>{activeSession.name}</p>
            <p style={{margin:0,fontSize:11,color:T.tx3,fontFamily:"Barlow"}}>{exIdx+1} / {activeSession.exercises.length}</p>
          </div>
          <div style={{background:T.card2,borderRadius:10,padding:"5px 11px",border:`1px solid ${T.bd}`}}>
            <p style={{margin:0,fontFamily:"Barlow Condensed",fontSize:18,color:A,fontWeight:700}}>{fmt(totalSecs)}</p>
          </div>
        </div>
        {/* image */}
        <div style={{position:"relative",height:220,overflow:"hidden"}}>
          <img src={imgSrc} alt={ex.name} onError={()=>setImgErr(p=>({...p,[ex.id]:true}))} style={{width:"100%",height:"100%",objectFit:"cover",filter:"brightness(0.45) saturate(0.7)"}}/>
          <div style={{position:"absolute",inset:0,background:`linear-gradient(to top,${T.bg} 0%,rgba(0,0,0,0.2) 65%,transparent 100%)`}}/>
          <div style={{position:"absolute",bottom:14,left:18,right:18}}>
            <div style={{display:"flex",gap:6,marginBottom:5,flexWrap:"wrap"}}>
              <span style={{fontSize:10,color:gc,background:gc+"25",borderRadius:6,padding:"2px 8px",fontFamily:"Barlow",fontWeight:600}}>{ex.group}</span>
              <span style={{fontSize:10,color:tag.color,background:tag.color+"20",borderRadius:6,padding:"2px 8px",fontFamily:"Barlow",fontWeight:600}}>{tag.label}</span>
            </div>
            <p style={{fontFamily:"Barlow Condensed",fontSize:32,fontWeight:900,lineHeight:1,color:"#fff"}}>{ex.name.toUpperCase()}</p>
            <p style={{fontSize:12,color:"rgba(255,255,255,0.65)",fontFamily:"Barlow",marginTop:3}}>{ex.muscle}</p>
          </div>
        </div>
        {/* rest */}
        {restOn&&restSecs>0&&(
          <div style={{margin:"10px 18px 0",background:T.card,border:`1px solid ${A}44`,borderRadius:14,padding:"11px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <p style={{margin:0,fontSize:10,color:T.tx3,letterSpacing:2,fontFamily:"Barlow"}}>DESCANSO</p>
              <p style={{margin:0,fontFamily:"Barlow Condensed",fontSize:28,fontWeight:800,color:A}}>{fmt(restSecs)}</p>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <svg width="40" height="40" style={{transform:"rotate(-90deg)"}}>
                <circle cx="20" cy="20" r="16" fill="none" stroke={T.card2} strokeWidth="3.5"/>
                <circle cx="20" cy="20" r="16" fill="none" stroke={A} strokeWidth="3.5"
                  strokeDasharray={`${2*Math.PI*16}`}
                  strokeDashoffset={`${2*Math.PI*16*(restSecs/restTotal)}`}
                  style={{transition:"stroke-dashoffset 1s linear"}}/>
              </svg>
              <button onClick={()=>{setRestOn(false);setRestSecs(0);}} style={{...bBtn(T),padding:"5px 10px",fontSize:11,fontFamily:"Barlow",color:T.tx3}}>Saltar</button>
            </div>
          </div>
        )}
        {/* sets dots */}
        <div style={{display:"flex",justifyContent:"center",gap:6,padding:"12px 0"}}>
          {Array.from({length:ex.sets}).map((_,i)=>(
            <div key={i} style={{width:i===setIdx?24:8,height:8,borderRadius:99,background:i<setIdx?A:i===setIdx?A:T.card2,transition:"all 0.3s"}}/>
          ))}
        </div>
        <div style={{padding:"4px 18px 30px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <p style={{margin:0,fontFamily:"Barlow Condensed",fontSize:25,fontWeight:800,color:T.tx}}>SERIE {setIdx+1}<span style={{color:T.tx3}}> / {ex.sets}</span></p>
            <p style={{margin:0,fontSize:12,color:T.tx3,fontFamily:"Barlow"}}>Obj: {plan.weight>0?`${plan.weight}${unit}×`:""}{plan.reps}</p>
          </div>
          {/* inputs */}
          <div style={{display:"flex",gap:10,marginBottom:10}}>
            {!ex.isGoma&&!ex.isCuerpo&&(
              <div style={{flex:1.3,background:T.card,borderRadius:14,padding:"11px 12px",border:`1px solid ${T.bd}`}}>
                <p style={{margin:"0 0 7px",fontSize:10,color:T.tx3,letterSpacing:2,fontFamily:"Barlow Condensed",fontWeight:700}}>{ex.isMancuerna?"MANCUERNA":`PESO (${unit})`}</p>
                {ex.isMancuerna?(
                  <div style={{display:"flex",gap:4}}>
                    {MANCUERNAS.map(v=>(
                      <button key={v} onClick={()=>setWeightI(String(v))} style={{flex:1,padding:"7px 2px",background:parseFloat(weightI)===v?A:T.card2,border:"none",borderRadius:7,cursor:"pointer",color:parseFloat(weightI)===v?"#000":T.tx2,fontFamily:"Barlow Condensed",fontWeight:700,fontSize:13}}>{v}</button>
                    ))}
                  </div>
                ):(
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <button onClick={()=>setWeightI(v=>String(Math.max(0,Math.round((parseFloat(v||0)-2.5)*10)/10)))} style={sBtn(T)}>−</button>
                    <input value={weightI} onChange={e=>setWeightI(e.target.value)} style={nInput(T)} type="number" inputMode="decimal"/>
                    <button onClick={()=>setWeightI(v=>String(Math.round((parseFloat(v||0)+2.5)*10)/10))} style={sBtn(T)}>+</button>
                  </div>
                )}
              </div>
            )}
            <div style={{flex:1,background:T.card,borderRadius:14,padding:"11px 12px",border:`1px solid ${T.bd}`}}>
              <p style={{margin:"0 0 7px",fontSize:10,color:T.tx3,letterSpacing:2,fontFamily:"Barlow Condensed",fontWeight:700}}>{ex.isTime?"SEG":"REPS"}</p>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <button onClick={()=>setRepsI(v=>String(Math.max(1,parseInt(v||0)-1)))} style={sBtn(T)}>−</button>
                <input value={repsI} onChange={e=>setRepsI(e.target.value)} style={nInput(T)} type="number" inputMode="numeric"/>
                <button onClick={()=>setRepsI(v=>String(parseInt(v||0)+1))} style={sBtn(T)}>+</button>
              </div>
            </div>
          </div>
          {/* note */}
          <input value={noteI} onChange={e=>setNoteI(e.target.value)} placeholder="💬 Nota (opcional)..."
            style={{width:"100%",background:T.card,border:`1px solid ${T.bd}`,borderRadius:10,padding:"10px 13px",color:T.tx,fontSize:13,fontFamily:"Barlow",outline:"none",marginBottom:10}}/>
          {/* cues */}
          {ex.cues&&ex.cues.length>0&&(
            <div style={{background:T.card,borderRadius:12,marginBottom:10,border:`1px solid ${T.bd}`,overflow:"hidden"}}>
              <button onClick={()=>setShowCues(c=>!c)} style={{width:"100%",background:"none",border:"none",padding:"10px 14px",display:"flex",justifyContent:"space-between",cursor:"pointer",color:T.tx}}>
                <span style={{fontSize:10,color:T.tx3,letterSpacing:2,fontFamily:"Barlow Condensed",fontWeight:700}}>TÉCNICA</span>
                <span style={{color:T.tx3,transform:showCues?"rotate(180deg)":"none",transition:"transform 0.3s"}}>▼</span>
              </button>
              {showCues&&(
                <div style={{padding:"0 14px 12px"}}>
                  {ex.cues.map((c,i)=>(
                    <div key={i} style={{display:"flex",gap:8,marginBottom:5}}>
                      <span style={{color:A,flexShrink:0}}>·</span>
                      <p style={{margin:0,fontSize:13,color:T.tx2,fontFamily:"Barlow",lineHeight:1.5}}>{c}</p>
                    </div>
                  ))}
                  {ex.equipment&&<p style={{margin:"8px 0 0",fontSize:11,color:T.tx3,fontFamily:"Barlow"}}>📦 {ex.equipment}</p>}
                </div>
              )}
            </div>
          )}
          {/* log button */}
          <button onClick={logSet} style={{...fBtn(A),marginBottom:14}}>
            {setIdx+1<ex.sets?"✓  SERIE COMPLETADA":"★  TERMINAR EJERCICIO"}
          </button>
          {/* logged sets */}
          {setLogs.length>0&&(
            <div>
              <SLabel t="SERIES REGISTRADAS"/>
              {setLogs.map((l,i)=>(
                <div key={i} style={{padding:"7px 0",borderBottom:`1px solid ${T.bd}`}}>
                  <div style={{display:"flex",justifyContent:"space-between"}}>
                    <span style={{fontSize:13,color:T.tx3,fontFamily:"Barlow"}}>Serie {i+1}</span>
                    <span style={{fontFamily:"Barlow Condensed",fontSize:17,fontWeight:700,color:i===setLogs.length-1?A:T.tx2}}>{l.weight>0?`${l.weight}${unit} × `:""}{l.reps}{ex.isTime?"s":" reps"}</span>
                  </div>
                  {l.note&&<p style={{margin:"2px 0 0",fontSize:11,color:T.tx3,fontFamily:"Barlow"}}>💬 {l.note}</p>}
                </div>
              ))}
            </div>
          )}
        </div>
        {/* progress modal */}
        {progModal&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",display:"flex",alignItems:"flex-end",zIndex:100,backdropFilter:"blur(8px)"}}>
            <div style={{background:T.card,borderRadius:"22px 22px 0 0",padding:"26px 20px 50px",width:"100%",maxWidth:430,border:`1px solid ${T.bd}`}}>
              <div style={{textAlign:"center",marginBottom:20}}>
                <p style={{fontSize:36,marginBottom:6}}>💪</p>
                <p style={{fontFamily:"Barlow Condensed",fontSize:30,fontWeight:900,color:T.tx}}>EJERCICIO LISTO</p>
                <p style={{fontSize:13,color:T.tx3,fontFamily:"Barlow"}}>{progModal.ex.name} · {progModal.logs.length} series</p>
              </div>
              <p style={{fontSize:11,color:T.tx3,letterSpacing:2,fontFamily:"Barlow Condensed",fontWeight:700,textAlign:"center",marginBottom:12}}>¿PRÓXIMA SESIÓN?</p>
              {[
                {key:"same",icon:"🔁",title:"MANTENER",sub:"Mismo peso y reps",col:T.tx2,bd:T.bd},
                {key:"weight",icon:"⬆",title:progModal.ex.isMancuerna?"SUBIR MANCUERNA":"SUBIR PESO +2.5kg",sub:"Más carga la próxima",col:A,bd:A+"55"},
                {key:"reps",icon:"🔢",title:"SUBIR REPETICIÓN",sub:"+1 rep la próxima",col:AD,bd:AD+"44"},
              ].map(o=>(
                <button key={o.key} onClick={()=>handleProg(o.key)} style={{width:"100%",display:"flex",alignItems:"center",gap:12,background:T.card2,border:`1px solid ${o.bd}`,borderRadius:14,padding:"13px 14px",marginBottom:9,cursor:"pointer",textAlign:"left",fontFamily:"inherit",color:T.tx}}>
                  <span style={{fontSize:20}}>{o.icon}</span>
                  <div>
                    <p style={{margin:0,fontFamily:"Barlow Condensed",fontSize:16,fontWeight:800,color:o.col}}>{o.title}</p>
                    <p style={{margin:0,fontSize:11,color:T.tx3,fontFamily:"Barlow"}}>{o.sub}</p>
                  </div>
                </button>
              ))}
            </div>
          </div>
        )}
      </div>
    );
  }

  // ── DONE ───────────────────────────────────────────────────────
  if(screen==="done") return(
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",padding:"0 30px",color:T.tx}}>
      <div style={{fontSize:76,marginBottom:14}}>🏆</div>
      <p style={{fontFamily:"Barlow Condensed",fontSize:60,fontWeight:900,lineHeight:0.85}}>SESIÓN<br/><span style={{color:A}}>LISTA</span></p>
      <p style={{color:T.tx3,fontFamily:"Barlow",fontSize:14,margin:"16px 0 6px"}}>Tiempo: <span style={{color:T.tx}}>{fmt(totalSecs)}</span></p>
      <p style={{color:A,fontFamily:"Barlow Condensed",fontSize:20,fontWeight:700,margin:"0 0 44px"}}>🔥 Racha: {streak.count} {streak.count===1?"día":"días"}</p>
      <button onClick={()=>setScreen("home")} style={{...fBtn(A),maxWidth:300,width:"100%"}}>← INICIO</button>
    </div>
  );

  return null;
}

// ─── SHARED COMPONENTS ───────────────────────────────────────────
function SLabel({t}){return <p style={{fontSize:10,color:"var(--tx3,#555)",letterSpacing:2,fontFamily:"Barlow Condensed",fontWeight:700,margin:"0 0 10px"}}>{t}</p>;}
function SRow({label,children,T}){return(
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 0",borderBottom:`1px solid ${T.bd}`,marginBottom:8}}>
    <p style={{margin:0,fontFamily:"Barlow",fontSize:15,color:T.tx}}>{label}</p>
    {children}
  </div>
);}
function Toggle({v,on}){return(
  <div onClick={()=>on(!v)} style={{width:46,height:25,background:v?A:"#333",borderRadius:99,position:"relative",cursor:"pointer",transition:"background 0.3s"}}>
    <div style={{position:"absolute",top:2.5,left:v?21:2.5,width:20,height:20,background:"#fff",borderRadius:99,transition:"left 0.3s",boxShadow:"0 1px 4px rgba(0,0,0,0.3)"}}/>
  </div>
);}
function SCrd({label,value,T,hl}){return(
  <div style={{flex:1,background:hl?A+"15":T.card,border:`1px solid ${hl?A+"44":T.bd}`,borderRadius:12,padding:"9px 10px",textAlign:"center"}}>
    <p style={{margin:0,fontSize:9,color:hl?A:T.tx3,letterSpacing:2,fontFamily:"Barlow Condensed",fontWeight:700}}>{label}</p>
    <p style={{margin:"3px 0 0",fontFamily:"Barlow Condensed",fontSize:18,fontWeight:800,color:hl?A:T.tx}}>{value}</p>
  </div>
);}
function bBtn(T){return{background:T.card,border:`1px solid ${T.bd}`,borderRadius:10,cursor:"pointer",color:T.tx,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Barlow Condensed",width:36,height:36,fontSize:16,fontWeight:700};}
function fBtn(bg){return{width:"100%",padding:"15px",background:bg,border:"none",borderRadius:14,color:bg===A?"#0A0A0A":"#fff",fontFamily:"Barlow Condensed",fontWeight:900,fontSize:17,letterSpacing:1,cursor:"pointer"};}
function sBtn(T){return{background:T.card2,border:"none",color:T.tx,width:30,height:30,borderRadius:8,cursor:"pointer",fontSize:17,fontFamily:"Barlow",flexShrink:0};}
function nInput(T){return{flex:1,background:"none",border:"none",color:T.tx,fontSize:25,fontFamily:"Barlow Condensed",fontWeight:700,width:"100%",textAlign:"center",outline:"none"};}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
