function loadStore(){ try{ return JSON.parse(localStorage.getItem(SK)||"{}"); }catch{return{};} }
function useStore(){
  const [d,setD]=useState(loadStore);
  const save=useCallback(fn=>{ setD(p=>{const n=typeof fn==="function"?fn(p):fn; try{localStorage.setItem(SK,JSON.stringify(n));}catch{} return n;}); },[]);
  return [d,save];
}

function MiniChart({history,unit}){
  if(!history||history.length<2) return <p style={{textAlign:"center",padding:"28px",color:C.textMut,fontSize:13}}>Completa 2+ sesiones para ver la progresión</p>;
  const vals=history.map(h=>h.weight>0?h.weight:h.reps);
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const W=300,H=100,P=22;
  const pts=vals.map((v,i)=>[P+(i/(vals.length-1))*(W-P*2),H-P-((v-mn)/rng)*(H-P*2)]);
  const ln=pts.map((p,i)=>`${i===0?"M":"L"}${p[0]},${p[1]}`).join(" ");
  const ar=ln+` L${pts[pts.length-1][0]},${H-P} L${pts[0][0]},${H-P} Z`;
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
      <defs><linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.accent} stopOpacity="0.3"/><stop offset="100%" stopColor={C.accent} stopOpacity="0"/></linearGradient></defs>
      <path d={ar} fill="url(#g1)"/><path d={ln} fill="none" stroke={C.accent} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i)=>(<g key={i}><circle cx={p[0]} cy={p[1]} r="4" fill={C.accent} stroke={C.bg} strokeWidth="2"/>
        <text x={p[0]} y={p[1]-9} textAnchor="middle" fill={C.accent} fontSize="9" fontFamily="Inter" fontWeight="700">{vals[i]}{unit}</text>
        <text x={p[0]} y={H-3} textAnchor="middle" fill={C.textMut} fontSize="8" fontFamily="Inter">{history[i].date}</text></g>))}
    </svg>
  );
}

  const [sessions,setSessions]=useState(()=>store.sessions||DEF_SESSIONS);
  const [logData,setLogData]=useState(()=>store.logData||{});
  const [streak,setStreak]=useState(()=>store.streak||{count:0,lastDate:null});
  const [savedWS,setSavedWS]=useState(()=>store.savedWS||null);
  const [sesDates,setSesDates]=useState(()=>store.sesDates||{});
  const [unit,setUnit]=useState(()=>store.unit||"kg");
  const [screen,setScreen]=useState("home");
  const [activeS,setActiveS]=useState(null);
  const [exIdx,setExIdx]=useState(0);
  const [setIdx,setSetIdx]=useState(0);
  const [setLogs,setSetLogs]=useState([]);
  const [progModal,setProgModal]=useState(null);
  const [resumeModal,setResumeModal]=useState(false);
  const [totalSecs,setTotalSecs]=useState(0);
  const [timerOn,setTimerOn]=useState(false);
  const [restSecs,setRestSecs]=useState(0);
  const [restOn,setRestOn]=useState(false);
  const [weightI,setWeightI]=useState("");
  const [repsI,setRepsI]=useState("");
  const [noteI,setNoteI]=useState("");
  const [showCues,setShowCues]=useState(false);
  const [swapModal,setSwapModal]=useState(null);
  const [libQ,setLibQ]=useState("");
  const [histModal,setHistModal]=useState(null);
  const [settings,setSettings]=useState(false);
  const [reorderSi,setReorderSi]=useState(null);
  const mRef=useRef(); const rRef=useRef();

  useEffect(()=>{ saveStore(p=>({...p,sessions,logData,streak,savedWS,sesDates,unit})); },[sessions,logData,streak,savedWS,sesDates,unit]);
  useEffect(()=>{ if(timerOn) mRef.current=setInterval(()=>setTotalSecs(s=>s+1),1000); else clearInterval(mRef.current); return()=>clearInterval(mRef.current); },[timerOn]);
  useEffect(()=>{
    if(restOn){ rRef.current=setInterval(()=>setRestSecs(s=>{ if(s<=1){clearInterval(rRef.current);setRestOn(false);vibrate(500);return 0;} return s-1; }),1000); }
    else clearInterval(rRef.current);
    return()=>clearInterval(rRef.current);
  },[restOn]);

  const suggested = (() => {
    let oldest=null, oldestI=0;
    sessions.forEach((s,i)=>{
      const d=sesDates[s.id];
      if(!d){if(oldest!==null)return;oldest=null;oldestI=i;return;}
      if(oldest===null||new Date(d.raw)<new Date(oldest)){oldest=d.raw;oldestI=i;}
    });
    return sessions[oldestI];
  })();

  const getLog=(sId,n)=>logData[`${sId}__${n}`]||null;
  const getPlan=(sId,ex)=>{ const d=getLog(sId,ex.name); return d?{weight:d.lastWeight,reps:d.lastReps}:{weight:ex.weight||0,reps:ex.reps||8}; };

  function startSession(s){
    if(savedWS&&savedWS.sId===s.id){setActiveS(s);setResumeModal(true);return;}
    setSavedWS(null); initSes(s);
  }
  function initSes(s,res=null){
    setActiveS(s);setShowCues(false);setRestOn(false);setNoteI("");
    if(res){setExIdx(res.exIdx);setSetIdx(res.setIdx);setTotalSecs(res.totalSecs||0);setSetLogs(res.setLogs||[]);setWeightI(res.weightI||"");setRepsI(res.repsI||"");}
    else{setExIdx(0);setSetIdx(0);setTotalSecs(0);setSetLogs([]);const p=getPlan(s.id,s.exercises[0]);setWeightI(String(p.weight));setRepsI(String(p.reps));}
    setTimerOn(true);setScreen("exercise");
  }
  useEffect(()=>{ if(screen==="exercise"&&activeS) setSavedWS({sId:activeS.id,exIdx,setIdx,totalSecs,setLogs,weightI,repsI}); },[screen,exIdx,setIdx,setLogs,weightI,repsI]);

  function logSet(){
    const w=parseFloat(weightI)||0,r=parseInt(repsI)||0;
    const ex=activeS.exercises[exIdx];
    const upd=[...setLogs,{weight:w,reps:r,note:noteI.trim()}];
    setSetLogs(upd);setNoteI("");setRestSecs(ex.rest||90);setRestOn(true);
    if(setIdx+1<ex.sets) setSetIdx(s=>s+1);
    else setProgModal({ex,sId:activeS.id,logs:upd});
  }

  function handleProg(choice){
    const{ex,sId,logs}=progModal;
    const lW=logs[logs.length-1].weight,lR=logs[logs.length-1].reps;
    let nW=lW,nR=lR;
    if(choice==="weight"){if(ex.isMancuerna){const i=MANCUERNAS.indexOf(lW);nW=i!==-1&&i<MANCUERNAS.length-1?MANCUERNAS[i+1]:lW;}else nW=Math.round((lW+2.5)*10)/10;}
    else if(choice==="reps") nR=lR+1;
    const key=`${sId}__${ex.name}`,prev=logData[key]||{};
    setLogData(ld=>({...ld,[key]:{lastWeight:lW,lastReps:lR,nextWeight:nW,nextReps:nR,history:[...(prev.history||[]),{weight:lW,reps:lR,date:dateKey(),note:logs[logs.length-1].note||""}]}}));
    setProgModal(null);setRestOn(false);
    const next=exIdx+1;
    if(next<activeS.exercises.length){
      const nEx=activeS.exercises[next],p=getPlan(activeS.id,nEx);
      setWeightI(String(p.weight));setRepsI(String(p.reps));setExIdx(next);setSetIdx(0);setSetLogs([]);setShowCues(false);setNoteI("");
    } else {
      setTimerOn(false);setSavedWS(null);
      setSesDates(sd=>({...sd,[activeS.id]:{display:todayDisp(),raw:new Date().toISOString()}}));
      const today=new Date().toDateString();
      setStreak(p=>{const y=new Date(Date.now()-86400000).toDateString();if(p.lastDate===today)return p;return{count:p.lastDate===y?p.count+1:1,lastDate:today};});
      setScreen("done");
    }
  }

  function swapEx(si,ei,newEx){ setSessions(p=>p.map((s,i)=>i!==si?s:{...s,exercises:s.exercises.map((e,j)=>j!==ei?e:{...newEx,libId:newEx.id,sets:e.sets,image:gImg(newEx.name)})})); setSwapModal(null);setLibQ(""); }
  function moveEx(si,from,dir){ setSessions(p=>p.map((s,i)=>{ if(i!==si)return s; const a=[...s.exercises],to=from+dir; if(to<0||to>=a.length)return s; [a[from],a[to]]=[a[to],a[from]]; return{...s,exercises:a}; })); }

  // RESUME
  if(resumeModal&&activeS) return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32}}>
      <div style={{width:72,height:72,borderRadius:24,background:C.surface,border:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,marginBottom:24}}>⏸</div>
      <p style={{fontSize:22,fontWeight:800,marginBottom:6,textAlign:"center"}}>Sesión en pausa</p>
      <p style={{fontSize:14,color:C.textSec,marginBottom:4,textAlign:"center"}}>{activeS.name}</p>
      <p style={{fontSize:13,color:C.accent,fontWeight:600,marginBottom:40,textAlign:"center"}}>Ejercicio {(savedWS?.exIdx||0)+1}/{activeS.exercises.length} · Serie {(savedWS?.setIdx||0)+1}</p>
      <button onClick={()=>{setResumeModal(false);initSes(activeS,savedWS);}} style={PBtn}>Continuar donde lo dejé</button>
      <button onClick={()=>{setResumeModal(false);setSavedWS(null);initSes(activeS);}} style={{...GBtn,marginTop:10}}>Empezar desde el principio</button>
    </div>
  );

  // SWAP LIBRARY
  if(swapModal){
    const filtered=LIB.filter(e=>e.group===swapModal.group&&(!libQ||e.name.toLowerCase().includes(libQ.toLowerCase())));
    return(
      <div style={{minHeight:"100vh",background:C.bg}}>
        <div style={{padding:"56px 20px 14px",position:"sticky",top:0,background:C.bg,zIndex:10,borderBottom:`1px solid ${C.border}`}}>
          <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
            <button onClick={()=>{setSwapModal(null);setLibQ("");}} style={IBtn}>←</button>
            <div><p style={{fontSize:18,fontWeight:800}}>Cambiar ejercicio</p><p style={{fontSize:12,color:GC[swapModal.group]||C.accent,fontWeight:600,marginTop:2}}>{swapModal.group} · mismo grupo muscular</p></div>
          </div>
          <input value={libQ} onChange={e=>setLibQ(e.target.value)} placeholder="Buscar..." style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"11px 16px",color:C.text,fontSize:14,outline:"none"}}/>
        </div>
        <div style={{padding:"12px 20px 60px"}}>
          {filtered.map(ex=>{const tag=getTag(ex);return(
            <div key={ex.id} onClick={()=>swapEx(swapModal.si,swapModal.ei,ex)} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,marginBottom:10,overflow:"hidden",display:"flex",cursor:"pointer",height:80}}>
              <div style={{width:96,flexShrink:0,overflow:"hidden"}}><img src={gImg(ex.name)} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>
              <div style={{padding:"12px 14px",flex:1,minWidth:0,display:"flex",flexDirection:"column",justifyContent:"center"}}>
                <p style={{fontSize:15,fontWeight:700}}>{ex.name}</p>
                <p style={{fontSize:12,color:C.textSec,margin:"3px 0 5px"}}>{ex.muscle}</p>
                <div style={{display:"flex",gap:5}}><Chip label={ex.group} color={GC[ex.group]||C.accent}/><Chip label={tag.l} color={tag.c}/></div>
              </div>
            </div>
          );})}
        </div>
      </div>
    );
  }

  // REORDER
  if(reorderSi!==null){
    const s=sessions[reorderSi];
    return(
      <div style={{minHeight:"100vh",background:C.bg}}>
        <div style={{padding:"56px 20px 14px",position:"sticky",top:0,background:C.bg,zIndex:10,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:14}}>
          <button onClick={()=>setReorderSi(null)} style={IBtn}>←</button>
          <div><p style={{fontSize:18,fontWeight:800}}>Reordenar</p><p style={{fontSize:12,color:C.textSec,marginTop:2}}>{s.name}</p></div>
        </div>
        <div style={{padding:"12px 20px"}}>

            <span>💡</span>
            <p style={{fontSize:12,color:C.textSec,lineHeight:1.6}}><span style={{color:C.orange,fontWeight:600}}>Barra</span> primero · luego <span style={{color:C.blue,fontWeight:600}}>Mancuernas</span> · al final <span style={{color:C.accentDim,fontWeight:600}}>Gomas</span></p>
          </div>
          {s.exercises.map((ex,i)=>{const tag=getTag(ex);return(
            <div key={ex.id||i} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,marginBottom:8,display:"flex",alignItems:"center",gap:10,overflow:"hidden"}}>
              <div style={{width:54,height:50,flexShrink:0,overflow:"hidden"}}><img src={ex.image||gImg(ex.name)} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>
              <div style={{flex:1,minWidth:0,padding:"6px 0"}}><p style={{fontSize:14,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ex.name}</p><Chip label={tag.l} color={tag.c}/></div>
              <div style={{display:"flex",gap:4,padding:"0 10px",flexShrink:0}}>
                <button onClick={()=>moveEx(reorderSi,i,-1)} disabled={i===0} style={{...IBtn,width:30,height:30,opacity:i===0?0.25:1}}>↑</button>

  // SETTINGS
  if(settings) return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      <div style={{padding:"56px 22px 18px",display:"flex",alignItems:"center",gap:14,borderBottom:`1px solid ${C.border}`,marginBottom:22}}>

      <div style={{padding:"0 22px"}}>

            {["kg","lb"].map(u=><button key={u} onClick={()=>setUnit(u)} style={{padding:"6px 16px",background:unit===u?C.accent:"transparent",border:"none",borderRadius:8,color:unit===u?"#000":C.textSec,fontWeight:700,cursor:"pointer",fontSize:13}}>{u}</button>)}

        </div>
        <p style={SecT}>DATOS</p>
        <button onClick={()=>{const rows=[["Ejercicio","Fecha","Peso","Reps","Nota"]];Object.entries(logData).forEach(([k,v])=>{const n=k.split("__")[1];(v.history||[]).forEach(h=>rows.push([n,h.date,h.weight,h.reps,h.note||""]));});const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(rows.map(r=>r.join(",")).join("\n"));a.download="historial.csv";a.click();}} style={{...PBtn,marginBottom:10}}>Exportar historial CSV</button>
        <button onClick={()=>{if(confirm("¿Borrar todos los datos?")){setLogData({});setSessions(DEF_SESSIONS);setStreak({count:0,lastDate:null});setSavedWS(null);setSesDates({});}}} style={{...GBtn,color:C.red,borderColor:`${C.red}44`}}>Borrar todos los datos</button>
      </div>
    </div>
  );

  // HISTORY
  if(histModal){
    const key=`${histModal.sId}__${histModal.name}`,d=logData[key],hist=d?.history||[];

          <div><p style={{fontSize:18,fontWeight:800}}>{histModal.name}</p><p style={{fontSize:12,color:C.textSec,marginTop:2}}>{histModal.muscle}</p></div>
        </div>
        <div style={{padding:"0 20px"}}>
          {d&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:22}}>
            {[{l:"ÚLTIMO",v:d.lastWeight>0?`${d.lastWeight}${unit}×${d.lastReps}`:`${d.lastReps}r`},{l:"PRÓXIMO",v:d.nextWeight>0?`${d.nextWeight}${unit}×${d.nextReps}`:`${d.nextReps}r`,hi:true},{l:"SESIONES",v:hist.length}].map(x=>(
              <div key={x.l} style={{background:x.hi?`${C.accent}18`:C.surface,border:`1px solid ${x.hi?`${C.accent}44`:C.border}`,borderRadius:14,padding:12,textAlign:"center"}}>
                <p style={{fontSize:9,color:x.hi?C.accent:C.textMut,letterSpacing:1.5,fontWeight:700,marginBottom:4}}>{x.l}</p>
                <p style={{fontSize:17,fontWeight:800,color:x.hi?C.accent:C.text}}>{x.v}</p>
              </div>
            ))}
          </div>}
          <p style={SecT}>PROGRESIÓN</p>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:16,marginBottom:22,overflowX:"auto"}}><MiniChart history={hist} unit={d?.lastWeight>0?unit:"r"}/></div>
          <p style={SecT}>HISTORIAL</p>
          {hist.length===0&&<p style={{color:C.textMut,fontSize:13,textAlign:"center",padding:"24px 0"}}>Sin datos todavía</p>}
          {[...hist].reverse().map((h,i)=>(
            <div key={i} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 16px",marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <p style={{fontSize:18,fontWeight:700,color:C.accent}}>{h.weight>0?`${h.weight}${unit} × ${h.reps} reps`:`${h.reps} reps`}</p>
                <p style={{fontSize:12,color:C.textMut}}>{h.date}</p>
              </div>
              {h.note&&<p style={{margin:"5px 0 0",fontSize:12,color:C.textSec}}>"{h.note}"</p>}
            </div>
          ))}
        </div>
      </div>
    );
  }

  // HOME
  if(screen==="home"){
    const h=new Date().getHours();
    const greet=h<13?"Buenos días":h<20?"Buenas tardes":"Buenas noches";
    const allRec=sessions.flatMap(s=>s.exercises.map(ex=>({ex,s,d:getLog(s.id,ex.name)})).filter(x=>x.d));
    return(
      <div style={{minHeight:"100vh",background:C.bg,paddingBottom:60}}>
        {/* Header */}
        <div style={{padding:"56px 22px 0",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <p style={{fontSize:14,color:C.textSec,fontWeight:500}}>{greet}</p>
            <p style={{fontSize:26,fontWeight:800,marginTop:4,lineHeight:1.15}}>Tu entrenamiento<br/>de hoy</p>
          </div>
          <button onClick={()=>setSettings(true)} style={{...IBtn,width:42,height:42,marginTop:4,borderRadius:12,fontSize:18}}>⚙️</button>
        </div>
        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,padding:"20px 22px 0"}}>
          {[{label:"Racha",value:`${streak.count} días`,icon:"🔥"},{label:"Sesiones",value:Object.keys(sesDates).length,icon:"✓"},{label:"Récords",value:allRec.length,icon:"↑"}].map(x=>(
            <div key={x.label} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 8px",textAlign:"center"}}>
              <p style={{fontSize:18,marginBottom:4}}>{x.icon}</p>
              <p style={{fontSize:18,fontWeight:800}}>{x.value}</p>
              <p style={{fontSize:10,color:C.textMut,fontWeight:600,letterSpacing:1,marginTop:2}}>{x.label.toUpperCase()}</p>
            </div>
          ))}
        </div>
        {/* Paused session */}
        {savedWS&&(()=>{const s=sessions.find(s=>s.id===savedWS.sId);if(!s)return null;const ex=s.exercises[savedWS.exIdx];return(
          <div onClick={()=>startSession(s)} style={{margin:"18px 22px 0",borderRadius:20,overflow:"hidden",cursor:"pointer",position:"relative",height:96}}>
            <img src={ex?.image||gImg(ex?.name||"")} alt="" style={{width:"100%",height:"100%",objectFit:"cover",filter:"brightness(0.35)"}}/>
            <div style={{position:"absolute",inset:0,background:`linear-gradient(90deg,${C.accent}22,transparent)`,display:"flex",alignItems:"center",padding:"0 18px",gap:14}}>
              <div style={{width:40,height:40,borderRadius:12,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>⏸</div>
              <div><p style={{fontSize:12,color:C.accent,fontWeight:700,letterSpacing:0.5}}>SESIÓN EN PAUSA</p><p style={{fontSize:15,fontWeight:700,marginTop:2}}>{s.name} · Ejercicio {savedWS.exIdx+1}/{s.exercises.length}</p></div>
              <span style={{marginLeft:"auto",color:C.accent,fontSize:22}}>›</span>
            </div>
          </div>
        );})()}
        {/* Suggested */}
        {suggested&&(
          <div style={{padding:"20px 22px 0"}}>
            <p style={{...SecT,marginBottom:12}}>SUGERIDA PARA HOY</p>
            <div onClick={()=>startSession(suggested)} style={{borderRadius:22,overflow:"hidden",cursor:"pointer",position:"relative",height:190}}>
              <img src={suggested.exercises[0]?.image||gImg("")} alt="" style={{width:"100%",height:"100%",objectFit:"cover",filter:"brightness(0.4)"}}/>
              <div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(12,12,14,0.97) 0%,rgba(12,12,14,0.15) 60%,transparent 100%)"}}/>
              <div style={{position:"absolute",top:14,left:14}}>
                <div style={{width:36,height:36,borderRadius:10,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:16,color:"#000"}}>{suggested.icon}</div>
              </div>
              <div style={{position:"absolute",bottom:16,left:18,right:18,display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
                <div>
                  <p style={{fontSize:22,fontWeight:800,lineHeight:1}}>{suggested.name}</p>
                  <p style={{fontSize:13,color:"rgba(255,255,255,0.5)",marginTop:4}}>{suggested.subtitle} · {suggested.exercises.length} ejercicios</p>
                  {sesDates[suggested.id]
                    ? <p style={{fontSize:11,color:C.accent,fontWeight:600,marginTop:4}}>Última vez: {sesDates[suggested.id].display}</p>
                    : <p style={{fontSize:11,color:C.accentDim,fontWeight:600,marginTop:4}}>Sin completar aún</p>}
                </div>
                <div style={{width:40,height:40,borderRadius:12,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:"#000",flexShrink:0}}>▶</div>
              </div>
            </div>
          </div>
        )}
        {/* All sessions */}
        <div style={{padding:"22px 22px 0"}}>
          <p style={SecT}>TODAS LAS SESIONES</p>
          {sessions.map((s,si)=>{
            const isSug=s.id===suggested?.id,hasSaved=savedWS?.sId===s.id,lastDate=sesDates[s.id];
            return(
              <div key={s.id} style={{background:C.surface,border:`1px solid ${hasSaved?`${C.accent}55`:C.border}`,borderRadius:20,marginBottom:12,overflow:"hidden"}}>
                <div style={{display:"flex",alignItems:"center",gap:14,padding:"16px 16px 10px",cursor:"pointer"}} onClick={()=>startSession(s)}>
                  <div style={{width:44,height:44,borderRadius:13,background:isSug?C.accent:`${C.accent}18`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:16,color:isSug?"#000":C.accent,flexShrink:0}}>{s.icon}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <p style={{fontSize:16,fontWeight:700}}>{s.name}</p>
                      {isSug&&<span style={{fontSize:9,background:`${C.accent}20`,color:C.accent,borderRadius:6,padding:"2px 7px",fontWeight:700,letterSpacing:0.5}}>HOY</span>}
                    </div>
                    <p style={{fontSize:12,color:C.textSec,marginTop:2}}>{s.subtitle} · {s.exercises.length} ejercicios</p>

                  </div>
                  <button onClick={e=>{e.stopPropagation();setReorderSi(si);}} style={{...IBtn,width:32,height:32,fontSize:13,flexShrink:0}}>⇅</button>
                </div>
                {/* Exercise thumbnails */}
                <div style={{display:"flex",gap:5,padding:"0 16px 12px",overflowX:"auto"}}>
                  {s.exercises.map((ex,ei)=>{
                    const d=getLog(s.id,ex.name);const gc=GC[ex.group]||C.accent;
                    return(
                      <div key={ex.id||ei} style={{flexShrink:0,position:"relative",cursor:"pointer"}} onClick={e=>{e.stopPropagation();setSwapModal({si,ei,group:ex.group});setLibQ("");}}>
                        <div style={{width:52,height:52,borderRadius:12,overflow:"hidden",border:`1.5px solid ${C.border}`}}>
                          <img src={ex.image||gImg(ex.name)} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                        </div>
                        <div style={{position:"absolute",bottom:0,left:0,right:0,height:16,background:"linear-gradient(to top,rgba(0,0,0,0.7),transparent)",borderRadius:"0 0 10px 10px",display:"flex",alignItems:"flex-end",justifyContent:"center",paddingBottom:2}}>
                          <div style={{width:5,height:5,borderRadius:99,background:gc}}/>
                        </div>
                        {d&&<div style={{position:"absolute",top:-3,right:-3,width:14,height:14,borderRadius:99,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center"}}>
                          <span style={{fontSize:8,color:"#000",fontWeight:900}}>✓</span>
                        </div>}
                      </div>
                    );
                  })}
                </div>
                <div style={{padding:"0 16px 14px"}}>
                  <button onClick={()=>startSession(s)} style={{...PBtn,fontSize:14,padding:"12px"}}>{hasSaved?"⏸  Continuar sesión":"▶  Empezar sesión"}</button>
                </div>

        </div>
        {/* Records */}
        {allRec.length>0&&(
          <div style={{padding:"8px 22px 0"}}>
            <p style={SecT}>MIS RÉCORDS</p>
            {allRec.map(({ex,s,d})=>(
              <div key={ex.name+s.id} onClick={()=>setHistModal({name:ex.name,sId:s.id,muscle:ex.muscle})} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 0",borderBottom:`1px solid ${C.border}`,cursor:"pointer"}}>
                <div style={{width:40,height:40,borderRadius:10,overflow:"hidden",flexShrink:0}}><img src={ex.image||gImg(ex.name)} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>
                <div style={{flex:1,minWidth:0}}><p style={{fontSize:14,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ex.name}</p><p style={{fontSize:11,color:GC[ex.group]||C.textSec,marginTop:1,fontWeight:500}}>{ex.group}</p></div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <p style={{fontSize:16,fontWeight:700,color:C.accent}}>{d.lastWeight>0?`${d.lastWeight}${unit} × ${d.lastReps}`:`${d.lastReps} reps`}</p>
                  {(d.nextWeight!==d.lastWeight||d.nextReps!==d.lastReps)&&<p style={{fontSize:10,color:C.textMut,marginTop:1}}>→ {d.nextWeight>0?`${d.nextWeight}${unit}×`:""}{d.nextReps}</p>}
                </div>
                <span style={{color:C.textMut,marginLeft:2}}>›</span>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

  // EXERCISE
  if(screen==="exercise"&&activeS){
    const ex=activeS.exercises[exIdx];
    const nextEx=exIdx+1<activeS.exercises.length?activeS.exercises[exIdx+1]:null;
    const plan=getPlan(activeS.id,ex);
    const tag=getTag(ex);const gc=GC[ex.group]||C.accent;
    const pct=(exIdx/activeS.exercises.length)*100;
    const imgUrl=ex.image||gImg(ex.name);
    return(
      <div style={{minHeight:"100vh",background:C.bg,paddingBottom:40}}>
        {/* Topbar */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"52px 18px 10px",position:"sticky",top:0,background:C.bg,zIndex:10}}>
          <button onClick={()=>{setTimerOn(false);setScreen("home");}} style={IBtn}>✕</button>
          <div style={{textAlign:"center"}}><p style={{fontSize:13,fontWeight:700}}>{activeS.name}</p><p style={{fontSize:11,color:C.textSec,marginTop:2}}>{exIdx+1} de {activeS.exercises.length}</p></div>
          <div style={{background:C.surface,borderRadius:12,padding:"6px 12px",border:`1px solid ${C.border}`}}><p style={{fontSize:15,fontWeight:700,color:C.accent}}>{fmt(totalSecs)}</p></div>
        </div>
        {/* Progress */}
        <div style={{height:2,background:C.border,margin:"0 18px"}}><div style={{height:"100%",background:C.accent,width:`${pct}%`,transition:"width 0.6s",borderRadius:99}}/></div>
        {/* Hero image */}
        <div style={{position:"relative",height:240,margin:"12px 0 0",overflow:"hidden"}}>
          <img src={imgUrl} alt={ex.name} style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top"}}/>
          <div style={{position:"absolute",inset:0,background:`linear-gradient(to top,${C.bg} 0%,rgba(12,12,14,0.45) 55%,transparent 100%)`}}/>
          <div style={{position:"absolute",bottom:18,left:18,right:18}}>
            <div style={{display:"flex",gap:6,marginBottom:8}}><Chip label={ex.group} color={gc}/><Chip label={tag.l} color={tag.c}/></div>
            <p style={{fontSize:28,fontWeight:900,lineHeight:1,letterSpacing:-0.5}}>{ex.name}</p>
            <p style={{fontSize:13,color:"rgba(255,255,255,0.5)",marginTop:5}}>{ex.muscle}</p>
          </div>
        </div>
        {/* Rest */}
        {restOn&&restSecs>0&&(
          <div style={{margin:"12px 18px 0",background:C.surface,border:`1px solid ${C.accent}44`,borderRadius:18,padding:"14px 16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <p style={{fontSize:10,color:C.textMut,letterSpacing:1.5,fontWeight:700,marginBottom:4}}>DESCANSO</p>
                <p style={{fontSize:36,fontWeight:800,color:C.accent,lineHeight:1}}>{fmt(restSecs)}</p>
              </div>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <svg width="44" height="44" style={{transform:"rotate(-90deg)"}}>
                  <circle cx="22" cy="22" r="18" fill="none" stroke={C.border} strokeWidth="3"/>
                  <circle cx="22" cy="22" r="18" fill="none" stroke={C.accent} strokeWidth="3" strokeDasharray={`${2*Math.PI*18}`} strokeDashoffset={`${2*Math.PI*18*(restSecs/(ex.rest||90))}`} style={{transition:"stroke-dashoffset 1s linear"}}/>
                </svg>
                <button onClick={()=>{setRestOn(false);setRestSecs(0);}} style={{...GBtn,width:"auto",padding:"6px 12px",fontSize:12}}>Saltar</button>
              </div>
            </div>
            {nextEx&&(
              <div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:38,height:38,borderRadius:9,overflow:"hidden",flexShrink:0}}><img src={nextEx.image||gImg(nextEx.name)} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>
                <div style={{flex:1,minWidth:0}}><p style={{fontSize:10,color:C.textMut,fontWeight:700,letterSpacing:1,marginBottom:2}}>SIGUIENTE</p><p style={{fontSize:14,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{nextEx.name}</p></div>
                <Chip label={getTag(nextEx).l} color={getTag(nextEx).c}/>
              </div>
            )}
          </div>
        )}
        {/* Sets dots */}
        <div style={{display:"flex",justifyContent:"center",gap:6,padding:"12px 0"}}>
          {Array.from({length:ex.sets}).map((_,i)=><div key={i} style={{width:i===setIdx?28:8,height:8,borderRadius:99,background:i<setIdx?C.accent:i===setIdx?C.accent:C.border,transition:"all 0.3s"}}/>)}
        </div>
        <div style={{padding:"8px 18px 30px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:14}}>
            <p style={{fontSize:22,fontWeight:800}}>Serie {setIdx+1}<span style={{color:C.textMut,fontWeight:400}}> / {ex.sets}</span></p>
            <p style={{fontSize:12,color:C.textSec}}>Última: {plan.weight>0?`${plan.weight}${unit} × `:""}{plan.reps}{ex.isTime?"s":" reps"}</p>
          </div>
          {/* Inputs */}
          <div style={{display:"flex",gap:10,marginBottom:12}}>
            {!ex.isGoma&&!ex.isCuerpo&&(
              <div style={{flex:1.3,background:C.surface,borderRadius:16,padding:14,border:`1px solid ${C.border}`}}>
                <p style={{fontSize:10,color:C.textMut,letterSpacing:1.5,fontWeight:700,marginBottom:8}}>{ex.isMancuerna?"MANCUERNA":`PESO (${unit})`}</p>
                {ex.isMancuerna?(
                  <div style={{display:"flex",gap:4}}>
                    {MANCUERNAS.map(v=><button key={v} onClick={()=>setWeightI(String(v))} style={{flex:1,padding:"8px 2px",background:parseFloat(weightI)===v?C.accent:C.card,border:"none",borderRadius:8,cursor:"pointer",color:parseFloat(weightI)===v?"#000":C.textSec,fontWeight:700,fontSize:13}}>{v}</button>)}
                  </div>
                ):(
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <button onClick={()=>setWeightI(v=>String(Math.max(0,Math.round((parseFloat(v||0)-2.5)*10)/10)))} style={SBtn}>−</button>
                    <input value={weightI} onChange={e=>setWeightI(e.target.value)} style={NIn} type="number" inputMode="decimal"/>
                    <button onClick={()=>setWeightI(v=>String(Math.round((parseFloat(v||0)+2.5)*10)/10))} style={SBtn}>+</button>
                  </div>
                )}
              </div>
            )}
            <div style={{flex:1,background:C.surface,borderRadius:16,padding:14,border:`1px solid ${C.border}`}}>
              <p style={{fontSize:10,color:C.textMut,letterSpacing:1.5,fontWeight:700,marginBottom:8}}>{ex.isTime?"SEGUNDOS":"REPS"}</p>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <button onClick={()=>setRepsI(v=>String(Math.max(1,parseInt(v||0)-1)))} style={SBtn}>−</button>
                <input value={repsI} onChange={e=>setRepsI(e.target.value)} style={NIn} type="number" inputMode="numeric"/>
                <button onClick={()=>setRepsI(v=>String(parseInt(v||0)+1))} style={SBtn}>+</button>
              </div>
            </div>
          </div>
          <input value={noteI} onChange={e=>setNoteI(e.target.value)} placeholder="Añadir nota..." style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"11px 14px",color:C.text,fontSize:13,outline:"none",marginBottom:10}}/>
          {ex.cues&&ex.cues.length>0&&(
            <div style={{background:C.surface,borderRadius:14,marginBottom:12,border:`1px solid ${C.border}`,overflow:"hidden"}}>
              <button onClick={()=>setShowCues(c=>!c)} style={{width:"100%",background:"none",border:"none",padding:"12px 16px",display:"flex",justifyContent:"space-between",cursor:"pointer",color:C.textSec,alignItems:"center"}}>
                <span style={{fontSize:11,letterSpacing:1.5,fontWeight:700}}>TÉCNICA</span>
                <span style={{fontSize:12,transform:showCues?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span>
              </button>
              {showCues&&<div style={{padding:"0 16px 14px"}}>
                {ex.cues.map((c,i)=><div key={i} style={{display:"flex",gap:10,marginBottom:7}}><div style={{width:4,height:4,borderRadius:99,background:C.accent,flexShrink:0,marginTop:7}}/><p style={{margin:0,fontSize:13,color:C.textSec,lineHeight:1.55}}>{c}</p></div>)}
              </div>}
            </div>
          )}
          <button onClick={logSet} style={{...PBtn,fontSize:15,marginBottom:16}}>{setIdx+1<ex.sets?"Serie completada  ✓":"Terminar ejercicio  ★"}</button>
          {setLogs.length>0&&(
            <div style={{background:C.surface,borderRadius:16,border:`1px solid ${C.border}`,overflow:"hidden"}}>
              <p style={{fontSize:10,color:C.textMut,letterSpacing:1.5,fontWeight:700,padding:"12px 14px 8px"}}>SERIES REGISTRADAS</p>
              {setLogs.map((l,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",borderTop:`1px solid ${C.border}`}}>
                  <p style={{fontSize:13,color:C.textSec,fontWeight:500}}>Serie {i+1}</p>
                  <div style={{textAlign:"right"}}>
                    <p style={{fontSize:16,fontWeight:700,color:i===setLogs.length-1?C.accent:C.text}}>{l.weight>0?`${l.weight}${unit} × `:""}{l.reps}{ex.isTime?"s":" reps"}</p>
                    {l.note&&<p style={{fontSize:11,color:C.textMut,marginTop:1}}>"{l.note}"</p>}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
        {/* Progress modal */}
        {progModal&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"flex-end",zIndex:100,backdropFilter:"blur(10px)"}}>
            <div style={{background:C.surface,borderRadius:"24px 24px 0 0",padding:"28px 20px 52px",width:"100%",maxWidth:430,border:`1px solid ${C.border}`}}>
              <div style={{textAlign:"center",marginBottom:18}}><div style={{fontSize:40,marginBottom:10}}>💪</div><p style={{fontSize:22,fontWeight:800}}>Ejercicio completado</p><p style={{fontSize:13,color:C.textSec,marginTop:4}}>{progModal.ex.name} · {progModal.logs.length} series</p></div>
              {nextEx&&(
                <div style={{background:C.card,borderRadius:14,padding:"12px 14px",marginBottom:18,display:"flex",gap:12,alignItems:"center"}}>
                  <div style={{width:44,height:44,borderRadius:10,overflow:"hidden",flexShrink:0}}><img src={nextEx.image||gImg(nextEx.name)} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>
                  <div><p style={{fontSize:10,color:C.textMut,fontWeight:700,letterSpacing:1,marginBottom:3}}>SIGUIENTE</p><p style={{fontSize:15,fontWeight:700}}>{nextEx.name}</p><p style={{fontSize:11,color:C.textSec,marginTop:1}}>{getTag(nextEx).l} · {nextEx.sets} series</p></div>
                </div>
              )}
              <p style={{fontSize:10,color:C.textMut,letterSpacing:1.5,fontWeight:700,textAlign:"center",marginBottom:12}}>¿PRÓXIMA SESIÓN?</p>
              {[{k:"same",icon:"🔁",title:"Mantener",sub:"Mismo peso y reps",color:C.textSec},
                {k:"weight",icon:"⬆",title:progModal.ex.isMancuerna?"Subir mancuerna":"Subir peso +2.5 kg",sub:"Más carga la próxima vez",color:C.accent},
                {k:"reps",icon:"🔢",title:"Subir repetición",sub:"+1 rep la próxima vez",color:C.accentDim}].map(o=>(
                <button key={o.k} onClick={()=>handleProg(o.k)} style={{width:"100%",display:"flex",alignItems:"center",gap:14,background:C.card,border:`1px solid ${o.k==="weight"?`${C.accent}44`:o.k==="reps"?`${C.accentDim}33`:C.border}`,borderRadius:14,padding:"14px 16px",marginBottom:9,cursor:"pointer",textAlign:"left",color:C.text}}>
                  <span style={{fontSize:22}}>{o.icon}</span>
                  <div><p style={{margin:0,fontSize:15,fontWeight:700,color:o.color}}>{o.title}</p><p style={{margin:0,fontSize:12,color:C.textMut,marginTop:2}}>{o.sub}</p></div>
                </button>
              ))}
            </div>
          </div>
        )}
      </div>
    );
  }

  // DONE
  if(screen==="done") return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",padding:"0 30px"}}>
      <div style={{fontSize:72,marginBottom:20}}>🏆</div>
      <p style={{fontSize:13,color:C.textSec,fontWeight:600,letterSpacing:1.5,marginBottom:8}}>SESIÓN COMPLETADA</p>
      <p style={{fontSize:52,fontWeight:900,lineHeight:0.9,letterSpacing:-1}}>{fmt(totalSecs)}</p>
      <p style={{fontSize:13,color:C.textMut,marginTop:8,marginBottom:4}}>tiempo de entrenamiento</p>
      <div style={{display:"flex",alignItems:"center",gap:6,marginTop:16,marginBottom:48}}><span style={{fontSize:20}}>🔥</span><p style={{fontSize:18,fontWeight:700,color:C.accent}}>Racha de {streak.count} {streak.count===1?"día":"días"}</p></div>
      <button onClick={()=>setScreen("home")} style={{...PBtn,maxWidth:300,width:"100%"}}>Volver al inicio</button>
    </div>
  );
  return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
