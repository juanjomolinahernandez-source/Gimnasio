// ── REP RANGES by exercise type ───────────────────────────────
// repMin, repMax define the double-progression range
// category: "compound_heavy" | "compound_secondary" | "isolation" | "accessory"
const REP_RANGES = {
  compound_heavy:     { min:5, max:8,  label:"5-8 reps",  incWeight:2.5 },
  compound_secondary: { min:8, max:12, label:"8-12 reps", incWeight:2.5 },
  isolation:          { min:10,max:15, label:"10-15 reps",incWeight:2.5 },
  accessory:          { min:12,max:20, label:"12-20 reps",incWeight:0   },
};

// ── COACH ENGINE ─────────────────────────────────────────────
// Analyses completed sets and returns a coaching decision + message
function analysePerformance(logs, ex) {
  if(!logs||logs.length===0) return null;
  const range = REP_RANGES[ex.category||"compound_secondary"];
  const reps = logs.map(l=>l.reps);
  const weight = logs[0].weight;
  const allSets = ex.sets;
  const avgReps = reps.reduce((a,b)=>a+b,0)/reps.length;
  const allAtMax = reps.every(r=>r>=range.max);
  const allAtMin = reps.every(r=>r>=range.min);
  const anyBelow = reps.some(r=>r<range.min);
  const completedAllSets = logs.length >= allSets;

  // Determine status
  let status, decision, message, nextWeight, nextReps, emoji;

  if(anyBelow) {
    // Below range — reduce weight
    status = "below";
    emoji = "🔴";
    const newW = ex.isMancuerna
      ? Math.max(0, Math.round((weight - 2.5)*10)/10)
      : Math.max(0, Math.round((weight - 2.5)*10)/10);
    nextWeight = newW;
    nextReps = range.min;
    decision = "BAJAR PESO";
    message = `Algunas series por debajo del mínimo (${range.min} reps). La próxima sesión baja a ${newW>0?newW+"kg":"menos carga"} y empieza desde ${range.min} reps.`;
  } else if(allAtMax && completedAllSets) {
    // Hit ceiling — increase weight
    status = "max";
    emoji = "🟢";
    let newW;
    if(ex.isMancuerna) {
      newW = Math.round((weight+2.5)*10)/10;
    } else if(ex.isCuerpo||ex.isGoma||ex.category==="accessory") {
      newW = weight; // body weight — just note achievement
    } else {
      newW = Math.round((weight+range.incWeight)*10)/10;
    }
    nextWeight = newW;
    nextReps = range.min;
    decision = ex.isCuerpo||ex.isGoma ? "¡RÉCORD!" : "SUBIR PESO";
    message = ex.isCuerpo||ex.isGoma
      ? `¡Conseguiste ${range.max} reps en todas las series! Marca personal. Intenta superar esto la próxima vez.`
      : `¡Completaste todas las series en ${range.max} reps! La próxima sesión sube a ${newW}kg y empieza desde ${range.min} reps.`;
  } else {
    // Progressing within range
    status = "progress";
    emoji = "🟡";
    // Target: add 1 rep to the weakest set next time
    const minReps = Math.min(...reps);
    const targetReps = Math.min(minReps+1, range.max);
    nextWeight = weight;
    nextReps = reps[reps.length-1]; // last set as reference
    decision = "MANTENER PESO";
    message = `Buen trabajo. Mantén ${weight>0?weight+"kg":"el mismo peso"} e intenta llegar a ${targetReps} reps en todas las series. Rango objetivo: ${range.label}.`;
  }

  return { status, emoji, decision, message, nextWeight, nextReps, repsLog: reps };
}

function loadStore(){ try{ return JSON.parse(localStorage.getItem(SK)||"{}"); }catch{return{};} }
function useStore(){
  const [d,setD]=useState(loadStore);
  const save=useCallback(fn=>{ setD(p=>{const n=typeof fn==="function"?fn(p):fn; try{localStorage.setItem(SK,JSON.stringify(n));}catch{} return n;}); },[]);
  return [d,save];
}

function Chip({label,color}){
  return <span style={{fontSize:10,color,background:color+"22",borderRadius:6,padding:"2px 8px",fontWeight:600,flexShrink:0,whiteSpace:"nowrap"}}>{label}</span>;
}

// ── SET TRAFFIC LIGHT ─────────────────────────────────────────
function SetLight({reps, ex}){
  if(!reps||!ex) return null;
  const range=REP_RANGES[ex.category||"compound_secondary"];
  let color, label;
  if(reps<range.min){ color=C.red; label="Por debajo"; }
  else if(reps>=range.max){ color=C.accent; label="¡Techo!"; }
  else { color=C.yellow; label="En rango"; }
  return <span style={{fontSize:10,color,background:color+"22",borderRadius:6,padding:"2px 7px",fontWeight:700}}>{label}</span>;
}

// ── COACH CARD ────────────────────────────────────────────────
function CoachCard({analysis, unit}){
  if(!analysis) return null;
  const statusColor = analysis.status==="max"?C.accent:analysis.status==="below"?C.red:C.yellow;
  const bg = analysis.status==="max"?`${C.accent}12`:analysis.status==="below"?`${C.red}12`:`${C.yellow}10`;
  return(
    <div style={{background:bg,border:`1px solid ${statusColor}44`,borderRadius:18,padding:"16px 18px",animation:"slideUp 0.3s ease"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
        <span style={{fontSize:24}}>{analysis.emoji}</span>
        <div>
          <p style={{fontSize:10,color:statusColor,fontWeight:700,letterSpacing:1.5}}>{analysis.decision}</p>
          <p style={{fontSize:16,fontWeight:800,color:C.text,marginTop:1}}>Análisis del entrenador</p>
        </div>
      </div>
      <p style={{fontSize:13,color:C.textSec,lineHeight:1.6,marginBottom:12}}>{analysis.message}</p>
      {analysis.nextWeight!==undefined&&(
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <div style={{background:C.surface,borderRadius:10,padding:"8px 12px",border:`1px solid ${C.border}`}}>
            <p style={{fontSize:9,color:C.textMut,fontWeight:700,letterSpacing:1,marginBottom:3}}>PRÓXIMO PESO</p>
            <p style={{fontSize:16,fontWeight:800,color:statusColor}}>{analysis.nextWeight>0?`${analysis.nextWeight}${unit}`:"Corporal"}</p>
          </div>
          <div style={{background:C.surface,borderRadius:10,padding:"8px 12px",border:`1px solid ${C.border}`}}>
            <p style={{fontSize:9,color:C.textMut,fontWeight:700,letterSpacing:1,marginBottom:3}}>OBJETIVO REPS</p>
            <p style={{fontSize:16,fontWeight:800,color:statusColor}}>{analysis.nextReps} reps</p>
          </div>
        </div>
      )}
    </div>
  );
}

// ── MINI CHART ────────────────────────────────────────────────
function MiniChart({history,unit}){
  if(!history||history.length<2) return <p style={{textAlign:"center",padding:"28px",color:C.textMut,fontSize:13}}>Completa 2+ sesiones para ver la progresión</p>;
  const vals=history.map(h=>h.weight>0?h.weight:h.reps);
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const W=300,H=100,P=22;
  const pts=vals.map((v,i)=>[P+(i/(vals.length-1))*(W-P*2),H-P-((v-mn)/rng)*(H-P*2)]);
  const ln=pts.map((p,i)=>`${i===0?"M":"L"}${p[0]},${p[1]}`).join(" ");
  const ar=ln+` L${pts[pts.length-1][0]},${H-P} L${pts[0][0]},${H-P} Z`;
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
      <defs><linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.accent} stopOpacity="0.3"/><stop offset="100%" stopColor={C.accent} stopOpacity="0"/></linearGradient></defs>
      <path d={ar} fill="url(#g1)"/><path d={ln} fill="none" stroke={C.accent} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i)=>(<g key={i}><circle cx={p[0]} cy={p[1]} r="4" fill={C.accent} stroke={C.bg} strokeWidth="2"/>
        <text x={p[0]} y={p[1]-9} textAnchor="middle" fill={C.accent} fontSize="9" fontFamily="Inter" fontWeight="700">{vals[i]}{unit}</text>
        <text x={p[0]} y={H-3} textAnchor="middle" fill={C.textMut} fontSize="8" fontFamily="Inter">{history[i].date}</text></g>))}
    </svg>
  );
}

  useEffect(()=>{ saveStore(p=>({...p,sessions,logData,streak,savedWS,sesDates,unit})); },[sessions,logData,streak,savedWS,sesDates,unit]);
  useEffect(()=>{ if(timerOn) mRef.current=setInterval(()=>setTotalSecs(s=>s+1),1000); else clearInterval(mRef.current); return()=>clearInterval(mRef.current); },[timerOn]);
  useEffect(()=>{
    if(restOn){ rRef.current=setInterval(()=>setRestSecs(s=>{ if(s<=1){clearInterval(rRef.current);setRestOn(false);vib(500);return 0;} return s-1; }),1000); }
    else clearInterval(rRef.current);

  },[restOn]);
  useEffect(()=>{

    if(d) return {weight:d.nextWeight!==undefined?d.nextWeight:d.lastWeight, reps:d.nextReps||ex.repMin||ex.reps};
    return {weight:ex.weight||0,reps:ex.repMin||ex.reps||8};
  };
  const currentSetLogs=allSetLogs[exIdx]||[];

  function startSession(s){ if(savedWS&&savedWS.sId===s.id){setActiveS(s);setResumeModal(true);return;} setSavedWS(null);initSes(s); }
  function initSes(s,res=null){

    if(res){ setExIdx(res.exIdx);setSetIdx(res.setIdx);setTotalSecs(res.totalSecs||0);setAllSetLogs(res.allSetLogs||{});setWeightI(res.weightI||"");setRepsI(res.repsI||""); }
    else { setExIdx(0);setSetIdx(0);setTotalSecs(0);setAllSetLogs({}); const p=getPlan(s.id,s.exercises[0]);setWeightI(String(p.weight));setRepsI(String(p.reps)); }
    setTimerOn(true);setScreen("exercise");
  }
  function jumpToEx(i){
    if(!activeS)return;
    setExIdx(i);setSetIdx(0);setShowCues(false);setNoteI("");setShowExList(false);setRestOn(false);setRestSecs(0);

  function logSet(){
    const w=parseFloat(weightI)||0,r=parseInt(repsI)||0;

    setAllSetLogs(upd);setNoteI("");setRestSecs(ex.rest||90);setRestOn(true);
    if(setIdx+1<ex.sets) setSetIdx(s=>s+1);
    else setProgModal({ex,sId:activeS.id,logs:upd[exIdx]});
  }

  function saveProgression(analysis, ex, sId){
    const key=`${sId}__${ex.name}`,prev=logData[key]||{};
    const lastW=analysis.repsLog[analysis.repsLog.length-1]!==undefined?parseFloat(weightI)||0:0;
    const logs=progModal.logs;
    setLogData(ld=>({...ld,[key]:{
      lastWeight:logs[logs.length-1].weight,
      lastReps:logs[logs.length-1].reps,
      nextWeight:analysis.nextWeight,
      nextReps:analysis.nextReps,
      lastAnalysis:analysis.decision,
      history:[...(prev.history||[]),{weight:logs[logs.length-1].weight,reps:logs[logs.length-1].reps,date:dateKey(),note:logs[logs.length-1].note||"",status:analysis.status}]
    }}));
  }

  function handleProg(){
    const{ex,sId,logs}=progModal;
    const analysis=analysePerformance(logs,ex);

    else {

  function swapEx(si,ei,newEx){ setSessions(p=>p.map((s,i)=>i!==si?s:{...s,exercises:s.exercises.map((e,j)=>j!==ei?e:{...newEx,libId:newEx.id,sets:e.sets,image:gImg(newEx.name),repMin:REP_RANGES[newEx.category||"compound_secondary"].min,repMax:REP_RANGES[newEx.category||"compound_secondary"].max})})); setSwapModal(null);setLibQ(""); }

  // ── RESUME MODAL ──────────────────────────────────────────────

          <p style={{fontSize:15,fontWeight:500}}>Sistema de peso</p>

          {d&&(
            <>
              <div style={{background:`${C.accent}12`,border:`1px solid ${C.accent}33`,borderRadius:16,padding:"14px 16px",marginBottom:16}}>
                <p style={{fontSize:10,color:C.accent,fontWeight:700,letterSpacing:1.5,marginBottom:8}}>INSTRUCCIÓN DEL ENTRENADOR</p>
                <p style={{fontSize:14,fontWeight:700,color:C.text}}>{d.lastAnalysis||"Completa una sesión para ver el diagnóstico"}</p>
                <div style={{display:"flex",gap:8,marginTop:10}}>
                  <div style={{flex:1,background:C.surface,borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
                    <p style={{fontSize:9,color:C.textMut,fontWeight:700,letterSpacing:1,marginBottom:3}}>PRÓXIMO PESO</p>
                    <p style={{fontSize:15,fontWeight:800,color:C.accent}}>{d.nextWeight>0?`${d.nextWeight}${unit}`:"Corporal"}</p>
                  </div>
                  <div style={{flex:1,background:C.surface,borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
                    <p style={{fontSize:9,color:C.textMut,fontWeight:700,letterSpacing:1,marginBottom:3}}>OBJETIVO REPS</p>
                    <p style={{fontSize:15,fontWeight:800,color:C.accent}}>{d.nextReps} reps</p>
                  </div>
                  <div style={{flex:1,background:C.surface,borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
                    <p style={{fontSize:9,color:C.textMut,fontWeight:700,letterSpacing:1,marginBottom:3}}>SESIONES</p>
                    <p style={{fontSize:15,fontWeight:800,color:C.accent}}>{hist.length}</p>
                  </div>
                </div>
              </div>
              <p style={SecT}>PROGRESIÓN</p>
              <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:16,marginBottom:20,overflowX:"auto"}}><MiniChart history={hist} unit={d.lastWeight>0?unit:"r"}/></div>
            </>
          )}
          <p style={SecT}>HISTORIAL</p>
          {hist.length===0&&<p style={{color:C.textMut,fontSize:13,textAlign:"center",padding:"24px 0"}}>Sin datos todavía</p>}
          {[...hist].reverse().map((h,i)=>(
            <div key={i} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:"13px 16px",marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <p style={{fontSize:17,fontWeight:700,color:h.status?statusDot(h.status):C.accent}}>{h.weight>0?`${h.weight}${unit} × ${h.reps} reps`:`${h.reps} reps`}</p>
                <p style={{fontSize:12,color:C.textMut}}>{h.date}</p>
              </div>
              {h.note&&<p style={{margin:"4px 0 0",fontSize:12,color:C.textSec}}>"{h.note}"</p>}
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ── HOME ──────────────────────────────────────────────────────
  if(screen==="home"){
    const hr=new Date().getHours();
    const greet=hr<13?"Buenos días":hr<20?"Buenas tardes":"Buenas noches";
    const allRec=sessions.flatMap(s=>s.exercises.map(ex=>({ex,s,d:getLog(s.id,ex.name)})).filter(x=>x.d));
    return(
      <div style={{minHeight:"100vh",background:C.bg,paddingBottom:60}}>
        <div style={{padding:"56px 22px 0",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <p style={{fontSize:14,color:C.textSec,fontWeight:500}}>{greet}</p>
            <p style={{fontSize:26,fontWeight:800,marginTop:4,lineHeight:1.15}}>Tu entrenamiento<br/>de hoy</p>
          </div>
          <button onClick={()=>setSettings(true)} style={{...IBtn,width:42,height:42,marginTop:4,borderRadius:12,fontSize:18}}>⚙️</button>
        </div>
        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,padding:"20px 22px 0"}}>
          {[{l:"Racha",v:`${streak.count} días`,i:"🔥"},{l:"Sesiones",v:Object.keys(sesDates).length,i:"✓"},{l:"Récords",v:allRec.length,i:"↑"}].map(x=>(
            <div key={x.l} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 8px",textAlign:"center"}}>
              <p style={{fontSize:18,marginBottom:4}}>{x.i}</p><p style={{fontSize:18,fontWeight:800}}>{x.v}</p><p style={{fontSize:10,color:C.textMut,fontWeight:600,letterSpacing:1,marginTop:2}}>{x.l.toUpperCase()}</p>
            </div>
          ))}
        </div>
        {/* Paused session banner */}
        {savedWS&&(()=>{const s=sessions.find(s=>s.id===savedWS.sId);if(!s)return null;const ex=s.exercises[savedWS.exIdx||0];const done=Object.keys(savedWS.allSetLogs||{}).length;return(
          <div onClick={()=>startSession(s)} style={{margin:"18px 22px 0",borderRadius:20,overflow:"hidden",cursor:"pointer",position:"relative",height:92}}>
            <img src={ex?.image||gImg("")} alt="" style={{width:"100%",height:"100%",objectFit:"cover",filter:"brightness(0.3)"}}/>
            <div style={{position:"absolute",inset:0,background:`linear-gradient(90deg,${C.accent}22,transparent)`,display:"flex",alignItems:"center",padding:"0 18px",gap:14}}>
              <div style={{width:40,height:40,borderRadius:12,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>⏸</div>
              <div><p style={{fontSize:12,color:C.accent,fontWeight:700,letterSpacing:0.5}}>SESIÓN EN PAUSA</p><p style={{fontSize:15,fontWeight:700,marginTop:2}}>{s.name} · {done} ejercicio{done!==1?"s":""} completado{done!==1?"s":""}</p></div>
              <span style={{marginLeft:"auto",color:C.accent,fontSize:22}}>›</span>
            </div>
          </div>
        );})()}
        {/* Suggested */}
        {suggested&&(
          <div style={{padding:"20px 22px 0"}}>
            <p style={{...SecT,marginBottom:12}}>SUGERIDA PARA HOY</p>
            <div onClick={()=>startSession(suggested)} style={{borderRadius:22,overflow:"hidden",cursor:"pointer",position:"relative",height:190}}>
              <img src={suggested.exercises[0]?.image||gImg("")} alt="" style={{width:"100%",height:"100%",objectFit:"cover",filter:"brightness(0.4)"}}/>
              <div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(12,12,14,0.97) 0%,rgba(12,12,14,0.15) 60%,transparent 100%)"}}/>
              <div style={{position:"absolute",top:14,left:14}}><div style={{width:36,height:36,borderRadius:10,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:16,color:"#000"}}>{suggested.icon}</div></div>
              <div style={{position:"absolute",bottom:16,left:18,right:18,display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
                <div>
                  <p style={{fontSize:22,fontWeight:800,lineHeight:1}}>{suggested.name}</p>
                  <p style={{fontSize:13,color:"rgba(255,255,255,0.5)",marginTop:4}}>{suggested.subtitle} · {suggested.exercises.length} ejercicios</p>
                  {sesDates[suggested.id]?<p style={{fontSize:11,color:C.accent,fontWeight:600,marginTop:4}}>Última vez: {sesDates[suggested.id].display}</p>:<p style={{fontSize:11,color:C.accentDim,fontWeight:600,marginTop:4}}>Sin completar aún</p>}
                </div>
                <div style={{width:40,height:40,borderRadius:12,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:"#000",flexShrink:0}}>▶</div>
              </div>
            </div>
          </div>
        )}
        {/* All sessions */}
        <div style={{padding:"22px 22px 0"}}>
          <p style={SecT}>TODAS LAS SESIONES</p>
          {sessions.map((s,si)=>{
            const isSug=s.id===suggested?.id,hasSaved=savedWS?.sId===s.id,lastDate=sesDates[s.id];
            return(
              <div key={s.id} style={{background:C.surface,border:`1px solid ${hasSaved?`${C.accent}55`:C.border}`,borderRadius:20,marginBottom:12,overflow:"hidden"}}>
                <div style={{display:"flex",alignItems:"center",gap:14,padding:"16px 16px 10px",cursor:"pointer"}} onClick={()=>startSession(s)}>
                  <div style={{width:44,height:44,borderRadius:13,background:isSug?C.accent:`${C.accent}18`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:16,color:isSug?"#000":C.accent,flexShrink:0}}>{s.icon}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <p style={{fontSize:16,fontWeight:700}}>{s.name}</p>
                      {isSug&&<span style={{fontSize:9,background:`${C.accent}20`,color:C.accent,borderRadius:6,padding:"2px 7px",fontWeight:700}}>HOY</span>}
                    </div>
                    <p style={{fontSize:12,color:C.textSec,marginTop:2}}>{s.subtitle} · {s.exercises.length} ejercicios</p>
                    {lastDate?<p style={{fontSize:11,color:C.textMut,marginTop:2}}>Última vez: {lastDate.display}</p>:<p style={{fontSize:11,color:C.textMut,marginTop:2}}>Sin completar aún</p>}
                  </div>
                  <button onClick={e=>{e.stopPropagation();setReorderSi(si);}} style={{...IBtn,width:32,height:32,fontSize:13,flexShrink:0}}>⇅</button>
                </div>
                <div style={{display:"flex",gap:5,padding:"0 16px 12px",overflowX:"auto"}}>
                  {s.exercises.map((ex,ei)=>{
                    const d=getLog(s.id,ex.name);const gc=GC[ex.group]||C.accent;
                    return(
                      <div key={ex.id||ei} style={{flexShrink:0,position:"relative",cursor:"pointer"}} onClick={e=>{e.stopPropagation();setSwapModal({si,ei,group:ex.group});setLibQ("");}}>
                        <div style={{width:52,height:52,borderRadius:12,overflow:"hidden",border:`1.5px solid ${C.border}`}}><img src={ex.image||gImg(ex.name)} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>
                        <div style={{position:"absolute",bottom:0,left:0,right:0,height:16,background:"linear-gradient(to top,rgba(0,0,0,0.7),transparent)",borderRadius:"0 0 10px 10px",display:"flex",alignItems:"flex-end",justifyContent:"center",paddingBottom:2}}><div style={{width:5,height:5,borderRadius:99,background:gc}}/></div>
                        {d&&<div style={{position:"absolute",top:-3,right:-3,width:14,height:14,borderRadius:99,background:d.lastAnalysis==="SUBIR PESO"?C.accent:d.lastAnalysis==="BAJAR PESO"?C.red:C.yellow,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:8,color:"#000",fontWeight:900}}>✓</span></div>}
                      </div>
                    );
                  })}
                </div>
                <div style={{padding:"0 16px 14px"}}><button onClick={()=>startSession(s)} style={{...PBtn,fontSize:14,padding:"12px"}}>{hasSaved?"⏸  Continuar sesión":"▶  Empezar sesión"}</button></div>
              </div>
            );
          })}
        </div>
        {/* Records */}
        {allRec.length>0&&(
          <div style={{padding:"8px 22px 0"}}>
            <p style={SecT}>MIS RÉCORDS</p>
            {allRec.map(({ex,s,d})=>(
              <div key={ex.name+s.id} onClick={()=>setHistModal({name:ex.name,sId:s.id,muscle:ex.muscle})} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 0",borderBottom:`1px solid ${C.border}`,cursor:"pointer"}}>
                <div style={{width:40,height:40,borderRadius:10,overflow:"hidden",flexShrink:0}}><img src={ex.image||gImg(ex.name)} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontSize:14,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ex.name}</p>
                  <p style={{fontSize:11,color:GC[ex.group]||C.textSec,marginTop:1,fontWeight:500}}>{ex.group}</p>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <p style={{fontSize:16,fontWeight:700,color:C.accent}}>{d.lastWeight>0?`${d.lastWeight}${unit} × ${d.lastReps}`:`${d.lastReps} reps`}</p>
                  <p style={{fontSize:10,color:d.lastAnalysis==="SUBIR PESO"?C.accent:d.lastAnalysis==="BAJAR PESO"?C.red:C.yellow,marginTop:1,fontWeight:600}}>{d.lastAnalysis||""}</p>
                </div>
                <span style={{color:C.textMut,marginLeft:2}}>›</span>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

  // ── EXERCISE SCREEN ───────────────────────────────────────────
  if(screen==="exercise"&&activeS){
    const ex=activeS.exercises[exIdx];
    const nextEx=exIdx+1<activeS.exercises.length?activeS.exercises[exIdx+1]:null;
    const plan=getPlan(activeS.id,ex);
    const tag=getTag(ex);const gc=GC[ex.group]||C.accent;
    const range=REP_RANGES[ex.category||"compound_secondary"];
    const pct=((exIdx)/activeS.exercises.length)*100;
    const imgUrl=ex.image||gImg(ex.name);
    const completedInSession=Object.values(allSetLogs).filter(l=>l&&l.length>0).length;

    // Live set traffic light
    const liveReps=parseInt(repsI)||0;
    let liveColor=C.textMut;
    if(liveReps>0){ if(liveReps<range.min) liveColor=C.red; else if(liveReps>=range.max) liveColor=C.accent; else liveColor=C.yellow; }

    return(
      <div style={{minHeight:"100vh",background:C.bg,paddingBottom:130}}>
        {/* Topbar */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"52px 18px 10px",position:"sticky",top:0,background:C.bg,zIndex:20}}>
          <button onClick={()=>{setTimerOn(false);setScreen("home");}} style={IBtn}>✕</button>
          <div style={{textAlign:"center"}}><p style={{fontSize:13,fontWeight:700}}>{activeS.name}</p><p style={{fontSize:11,color:C.textSec,marginTop:2}}>{exIdx+1} de {activeS.exercises.length}</p></div>
          <div style={{background:C.surface,borderRadius:12,padding:"6px 12px",border:`1px solid ${C.border}`}}><p style={{fontSize:15,fontWeight:700,color:C.accent}}>{fmt(totalSecs)}</p></div>
        </div>
        {/* Progress bar */}
        <div style={{height:2,background:C.border,margin:"0 18px"}}><div style={{height:"100%",background:C.accent,width:`${pct}%`,transition:"width 0.5s",borderRadius:99}}/></div>
        {/* Hero image */}
        <div style={{position:"relative",height:210,margin:"10px 0 0",overflow:"hidden"}}>
          <img src={imgUrl} alt={ex.name} style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top"}}/>
          <div style={{position:"absolute",inset:0,background:`linear-gradient(to top,${C.bg} 0%,rgba(12,12,14,0.4) 55%,transparent 100%)`}}/>
          <div style={{position:"absolute",bottom:14,left:18,right:18}}>
            <div style={{display:"flex",gap:6,marginBottom:7,flexWrap:"wrap"}}>
              <Chip label={ex.group} color={gc}/>
              <Chip label={tag.l} color={tag.c}/>
              <Chip label={range.label} color={C.textMut}/>
            </div>
            <p style={{fontSize:26,fontWeight:900,lineHeight:1,letterSpacing:-0.5}}>{ex.name}</p>
            <p style={{fontSize:12,color:"rgba(255,255,255,0.5)",marginTop:4}}>{ex.muscle}</p>
          </div>
        </div>
        {/* Rest timer */}
        {restOn&&restSecs>0&&(
          <div style={{margin:"10px 18px 0",background:C.surface,border:`1px solid ${C.accent}44`,borderRadius:18,padding:"12px 16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><p style={{fontSize:10,color:C.textMut,letterSpacing:1.5,fontWeight:700,marginBottom:3}}>DESCANSO</p><p style={{fontSize:34,fontWeight:800,color:C.accent,lineHeight:1}}>{fmt(restSecs)}</p></div>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <svg width="42" height="42" style={{transform:"rotate(-90deg)"}}>
                  <circle cx="21" cy="21" r="17" fill="none" stroke={C.border} strokeWidth="3"/>
                  <circle cx="21" cy="21" r="17" fill="none" stroke={C.accent} strokeWidth="3" strokeDasharray={`${2*Math.PI*17}`} strokeDashoffset={`${2*Math.PI*17*(restSecs/(ex.rest||90))}`} style={{transition:"stroke-dashoffset 1s linear"}}/>
                </svg>
                <button onClick={()=>{setRestOn(false);setRestSecs(0);}} style={{...GBtn,width:"auto",padding:"6px 12px",fontSize:12}}>Saltar</button>
              </div>
            </div>
            {nextEx&&(
              <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:36,height:36,borderRadius:8,overflow:"hidden",flexShrink:0}}><img src={nextEx.image||gImg(nextEx.name)} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>
                <div style={{flex:1,minWidth:0}}><p style={{fontSize:10,color:C.textMut,fontWeight:700,letterSpacing:1,marginBottom:2}}>SIGUIENTE</p><p style={{fontSize:13,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{nextEx.name}</p></div>
                <Chip label={getTag(nextEx).l} color={getTag(nextEx).c}/>
              </div>
            )}
          </div>
        )}
        {/* Sets dots */}
        <div style={{display:"flex",justifyContent:"center",gap:5,padding:"10px 0"}}>
          {Array.from({length:ex.sets}).map((_,i)=>{const isLogged=(allSetLogs[exIdx]||[]).length>i;return <div key={i} style={{width:i===setIdx?26:8,height:8,borderRadius:99,background:isLogged?C.accent:i===setIdx?C.accent:C.border,transition:"all 0.3s"}}/>;  })}
        </div>
        <div style={{padding:"4px 18px 16px"}}>
          {/* Serie label + live indicator */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <p style={{fontSize:20,fontWeight:800}}>Serie {setIdx+1}<span style={{color:C.textMut,fontWeight:400}}> / {ex.sets}</span></p>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <p style={{fontSize:12,color:C.textSec}}>Objetivo: {range.label}</p>
            </div>
          </div>
          {/* Inputs */}
          <div style={{display:"flex",gap:10,marginBottom:10}}>
            {!ex.isGoma&&!ex.isCuerpo&&(
              <div style={{flex:1.3,background:C.surface,borderRadius:16,padding:13,border:`1px solid ${C.border}`}}>
                <p style={{fontSize:10,color:C.textMut,letterSpacing:1.5,fontWeight:700,marginBottom:7}}>{ex.isMancuerna?"MANCUERNA":`PESO (${unit})`}</p>
                {ex.isMancuerna?(
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <button onClick={()=>setWeightI(v=>String(Math.max(0,Math.round((parseFloat(v||0)-2.5)*10)/10)))} style={SBtn}>−</button>
                    <input value={weightI} onChange={e=>setWeightI(e.target.value)} style={NIn} type="number" inputMode="decimal"/>
                    <button onClick={()=>setWeightI(v=>String(Math.round((parseFloat(v||0)+2.5)*10)/10))} style={SBtn}>+</button>
                  </div>
                ):(
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <button onClick={()=>setWeightI(v=>String(Math.max(0,Math.round((parseFloat(v||0)-2.5)*10)/10)))} style={SBtn}>−</button>
                    <input value={weightI} onChange={e=>setWeightI(e.target.value)} style={NIn} type="number" inputMode="decimal"/>
                    <button onClick={()=>setWeightI(v=>String(Math.round((parseFloat(v||0)+2.5)*10)/10))} style={SBtn}>+</button>
                  </div>
                )}
              </div>
            )}
            <div style={{flex:1,background:C.surface,borderRadius:16,padding:13,border:`1px solid ${liveReps>0?liveColor+"66":C.border}`,transition:"border-color 0.3s"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                <p style={{fontSize:10,color:C.textMut,letterSpacing:1.5,fontWeight:700}}>{ex.isTime?"SEGUNDOS":"REPS"}</p>
                {liveReps>0&&<span style={{fontSize:9,color:liveColor,fontWeight:700}}>{liveReps<range.min?"Bajo":liveReps>=range.max?"¡Techo!":"En rango"}</span>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <button onClick={()=>setRepsI(v=>String(Math.max(1,parseInt(v||0)-1)))} style={SBtn}>−</button>
                <input value={repsI} onChange={e=>setRepsI(e.target.value)} style={{...NIn,color:liveReps>0?liveColor:C.text,transition:"color 0.2s"}} type="number" inputMode="numeric"/>
                <button onClick={()=>setRepsI(v=>String(parseInt(v||0)+1))} style={SBtn}>+</button>
              </div>
            </div>
          </div>
          <input value={noteI} onChange={e=>setNoteI(e.target.value)} placeholder="Añadir nota..." style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"10px 14px",color:C.text,fontSize:13,outline:"none",marginBottom:10}}/>
          {ex.cues&&ex.cues.length>0&&(
            <div style={{background:C.surface,borderRadius:14,marginBottom:10,border:`1px solid ${C.border}`,overflow:"hidden"}}>
              <button onClick={()=>setShowCues(c=>!c)} style={{width:"100%",background:"none",border:"none",padding:"11px 16px",display:"flex",justifyContent:"space-between",cursor:"pointer",color:C.textSec,alignItems:"center"}}>
                <span style={{fontSize:11,letterSpacing:1.5,fontWeight:700}}>TÉCNICA</span>
                <span style={{fontSize:12,transform:showCues?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span>
              </button>
              {showCues&&<div style={{padding:"0 16px 12px"}}>
                {ex.cues.map((c,i)=><div key={i} style={{display:"flex",gap:10,marginBottom:6}}><div style={{width:4,height:4,borderRadius:99,background:C.accent,flexShrink:0,marginTop:7}}/><p style={{margin:0,fontSize:13,color:C.textSec,lineHeight:1.55}}>{c}</p></div>)}
              </div>}
            </div>
          )}
          <button onClick={logSet} style={{...PBtn,fontSize:15,marginBottom:10}}>{setIdx+1<ex.sets?"Serie completada  ✓":"Terminar ejercicio  ★"}</button>
          {/* Logged sets */}
          {currentSetLogs.length>0&&(
            <div style={{background:C.surface,borderRadius:14,border:`1px solid ${C.border}`,overflow:"hidden"}}>
              <p style={{fontSize:10,color:C.textMut,letterSpacing:1.5,fontWeight:700,padding:"10px 14px 7px"}}>SERIES REGISTRADAS</p>
              {currentSetLogs.map((l,i)=>{
                const r=REP_RANGES[ex.category||"compound_secondary"];
                const sc=l.reps<r.min?C.red:l.reps>=r.max?C.accent:C.yellow;
                return(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 14px",borderTop:`1px solid ${C.border}`}}>
                    <p style={{fontSize:13,color:C.textSec,fontWeight:500}}>Serie {i+1}</p>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:6,height:6,borderRadius:99,background:sc,flexShrink:0}}/>
                      <div style={{textAlign:"right"}}>
                        <p style={{fontSize:15,fontWeight:700,color:i===currentSetLogs.length-1?C.text:C.textSec}}>{l.weight>0?`${l.weight}${unit} × `:""}{l.reps}{ex.isTime?"s":" reps"}</p>
                        {l.note&&<p style={{fontSize:11,color:C.textMut,marginTop:1}}>"{l.note}"</p>}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* ── BOTTOM NAV ── */}
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:C.bg,borderTop:`1px solid ${C.border}`,zIndex:30,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
          <button onClick={()=>setShowExList(v=>!v)} style={{width:"100%",background:"none",border:"none",padding:"7px 0 4px",display:"flex",alignItems:"center",justifyContent:"center",gap:6,cursor:"pointer",color:C.textSec}}>
            <span style={{fontSize:11,fontWeight:700,letterSpacing:1}}>{showExList?"CERRAR":"EJERCICIOS"}</span>
            <span style={{fontSize:11,transform:showExList?"rotate(180deg)":"none",transition:"transform 0.25s"}}>▲</span>
            <span style={{fontSize:11,color:C.accent,fontWeight:600}}>{completedInSession}/{activeS.exercises.length}</span>
          </button>
          {showExList&&(
            <div style={{maxHeight:210,overflowY:"auto",borderTop:`1px solid ${C.border}`}}>
              {activeS.exercises.map((e,i)=>{
                const logs=allSetLogs[i]||[];const done=logs.length>=e.sets;const isActive=i===exIdx;const gc2=GC[e.group]||C.accent;
                return(
                  <div key={i} onClick={()=>jumpToEx(i)} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",background:isActive?`${C.accent}10`:C.bg,borderBottom:`1px solid ${C.border}`,cursor:"pointer"}}>
                    <div style={{width:38,height:38,borderRadius:9,overflow:"hidden",flexShrink:0,border:`2px solid ${isActive?C.accent:done?C.accent+"66":C.border}`}}><img src={e.image||gImg(e.name)} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontSize:13,fontWeight:isActive?700:500,color:isActive?C.accent:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{e.name}</p>
                      <p style={{fontSize:10,color:C.textMut,marginTop:1}}>{e.sets}×{REP_RANGES[e.category||"compound_secondary"].label} · <span style={{color:gc2}}>{e.group}</span></p>
                    </div>
                    <div style={{flexShrink:0}}>
                      {done&&<div style={{width:20,height:20,borderRadius:99,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:10,color:"#000",fontWeight:900}}>✓</span></div>}
                      {!done&&logs.length>0&&<p style={{fontSize:11,color:C.orange,fontWeight:600}}>{logs.length}/{e.sets}</p>}
                      {isActive&&!done&&logs.length===0&&<div style={{width:6,height:6,borderRadius:99,background:C.accent}}/>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          {/* Thumbnails */}
          <div ref={thumbRef} style={{display:"flex",gap:6,padding:"5px 14px 10px",overflowX:"auto"}}>
            {activeS.exercises.map((e,i)=>{
              const logs=allSetLogs[i]||[];const done=logs.length>=e.sets;const isActive=i===exIdx;
              return(
                <div key={i} data-idx={i} onClick={()=>jumpToEx(i)} style={{flexShrink:0,position:"relative",cursor:"pointer"}}>
                  <div style={{width:isActive?50:40,height:isActive?50:40,borderRadius:isActive?13:10,overflow:"hidden",border:`2px solid ${isActive?C.accent:done?C.accent+"55":C.border}`,transition:"all 0.25s",opacity:done&&!isActive?0.5:1}}>
                    <img src={e.image||gImg(e.name)} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                  </div>
                  {done&&<div style={{position:"absolute",top:-3,right:-3,width:13,height:13,borderRadius:99,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:8,color:"#000",fontWeight:900}}>✓</span></div>}
                  {isActive&&<div style={{position:"absolute",bottom:-5,left:"50%",transform:"translateX(-50%)",width:4,height:4,borderRadius:99,background:C.accent}}/>}
                </div>
              );
            })}
          </div>
        </div>

        {/* ── COACH MODAL ── */}
        {progModal&&(()=>{
          const analysis=analysePerformance(progModal.logs,progModal.ex);
          return(
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",display:"flex",alignItems:"flex-end",zIndex:100,backdropFilter:"blur(12px)"}}>
              <div style={{background:C.surface,borderRadius:"24px 24px 0 0",padding:"24px 20px 52px",width:"100%",maxWidth:430,border:`1px solid ${C.border}`,maxHeight:"85vh",overflowY:"auto"}}>
                <p style={{fontSize:11,color:C.textMut,fontWeight:700,letterSpacing:1.5,marginBottom:16,textAlign:"center"}}>ANÁLISIS DEL ENTRENADOR</p>
                {/* Coach card */}
                {analysis&&<CoachCard analysis={analysis} unit={unit}/>}
                {/* Next exercise preview */}
                {nextEx&&(
                  <div style={{background:C.card,borderRadius:14,padding:"11px 14px",marginTop:14,display:"flex",gap:12,alignItems:"center"}}>
                    <div style={{width:42,height:42,borderRadius:10,overflow:"hidden",flexShrink:0}}><img src={nextEx.image||gImg(nextEx.name)} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>
                    <div><p style={{fontSize:10,color:C.textMut,fontWeight:700,letterSpacing:1,marginBottom:3}}>SIGUIENTE EJERCICIO</p><p style={{fontSize:14,fontWeight:700}}>{nextEx.name}</p><p style={{fontSize:11,color:C.textSec,marginTop:1}}>{getTag(nextEx).l} · {REP_RANGES[nextEx.category||"compound_secondary"].label}</p></div>
                  </div>
                )}
                <button onClick={handleProg} style={{...PBtn,marginTop:16}}>
                  {nextEx?"Continuar  →":"Finalizar sesión  🏆"}
                </button>
              </div>
            </div>
          );
        })()}
      </div>
    );
  }

  // ── DONE ──────────────────────────────────────────────────────
  if(screen==="done") return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",padding:"0 30px"}}>
      <div style={{fontSize:72,marginBottom:20}}>🏆</div>
      <p style={{fontSize:13,color:C.textSec,fontWeight:600,letterSpacing:1.5,marginBottom:8}}>SESIÓN COMPLETADA</p>
      <p style={{fontSize:52,fontWeight:900,lineHeight:0.9,letterSpacing:-1}}>{fmt(totalSecs)}</p>
      <p style={{fontSize:13,color:C.textMut,marginTop:8,marginBottom:4}}>tiempo de entrenamiento</p>
      <div style={{display:"flex",alignItems:"center",gap:6,marginTop:16,marginBottom:48}}><span style={{fontSize:20}}>🔥</span><p style={{fontSize:18,fontWeight:700,color:C.accent}}>Racha de {streak.count} {streak.count===1?"día":"días"}</p></div>
      <button onClick={()=>setScreen("home")} style={{...PBtn,maxWidth:300,width:"100%"}}>Volver al inicio</button>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
